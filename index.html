// 載入所有案子（從 Notion）
function loadData(){
  return fetch(API+"?action=list")
    .then(function(r){return r.json();})
    .then(function(data){
      if(!Array.isArray(data))return null;
      return data.map(function(p){return Object.assign({},DEFS,p);});
    })
    .catch(function(e){
      console.warn("Notion 讀取失敗，改用 localStorage:",e);
      try{var v=localStorage.getItem("edit-tracker-STABLE");return v?JSON.parse(v).map(function(p){return Object.assign({},DEFS,p);}):null;}catch(e2){return null;}
    });
}

// 儲存單一案子（新增或更新）
function saveProject(p){
  if(p.notionId){
    // 更新
    return fetch(API+"?action=update",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)}).catch(function(e){console.error("更新失敗",e);});
  } else {
    // 新增
    return fetch(API+"?action=create",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)})
      .then(function(r){return r.json();})
      .catch(function(e){console.error("新增失敗",e);});
  }
}

// 刪除案子
function deleteProject(notionId){

}

// ── KANBAN ────────────────────────────────────────────────────────────────────
function Kanban(props){
  var projects=props.projects,onEdit=props.onEdit,onSC=props.onSC,onToggle=props.onToggle,cColors=props.cColors,onReorder=props.onReorder;
  var active=projects.filter(function(p){return!p.closed;});
  var ds=useState(null);var dragId=ds[0],setDragId=ds[1];
  var os=useState(null);var overCol=os[0],setOverCol=os[1];
  var oc=useState(null);var overCardId=oc[0],setOverCardId=oc[1];

  function sortCol(cards,colKey){
    if(colKey==="fin"){
      return cards.slice().sort(function(a,b){
        var hasA=a.kanbanPos!==null&&a.kanbanPos!==undefined;
        var hasB=b.kanbanPos!==null&&b.kanbanPos!==undefined;
        // 手動拖過的優先用 kanbanPos
        if(hasA&&hasB)return a.kanbanPos-b.kanbanPos;
        if(hasA)return-1;
        if(hasB)return 1;
        // 沒有手動排過的：finalDue 月份晚的在上，早的在下
        if(!a.finalDue&&!b.finalDue)return 0;
        if(!a.finalDue)return 1;
        if(!b.finalDue)return-1;
        // 只比較年月 YYYY-MM，忽略日
        var ma=a.finalDue.slice(0,7),mb=b.finalDue.slice(0,7);
        return mb.localeCompare(ma);
      });
    }
    // 其他欄：優先順序 → 同優先順序內看交件日（待執行欄沒交件日用上片日期）→ 手動拖拉(kanbanPos)
    return cards.slice().sort(function(a,b){
      var pa=priOrder(a),pb=priOrder(b);
      if(pa!==pb)return pa-pb;
      // 同優先順序：有 kanbanPos 的優先
      var hasA=a.kanbanPos!==null&&a.kanbanPos!==undefined;
      var hasB=b.kanbanPos!==null&&b.kanbanPos!==undefined;
      if(hasA&&hasB)return a.kanbanPos-b.kanbanPos;
      if(hasA)return-1;
      if(hasB)return 1;
      // 沒拖過的：看最近交件日，待執行欄沒有交件日就用工作月份
      var da=nextDue(a),db=nextDue(b);
      var isWaiting=colKey==="todo";
      if(isWaiting){
        var aHasDue=da!=="9999",bHasDue=db!=="9999";
        if(aHasDue&&!bHasDue)return-1;
        if(!aHasDue&&bHasDue)return 1;
        if(!aHasDue&&!bHasDue){
          da=a.month||"9999";
          db=b.month||"9999";
        }
      }
      return da.localeCompare(db);
    });
  }

  function handleDropOnCard(targetId,colKey){
    if(!dragId||dragId===targetId)return;
    var dragP=projects.find(function(p){return p.id===dragId;});
    var targetP=projects.find(function(p){return p.id===targetId;});
    if(!dragP||!targetP)return;
    var col=KCOLS.find(function(c){return c.key===colKey;});
    if(!col)return;
    var isSameCol=col.st.indexOf(dragP.status)>=0&&col.st.indexOf(targetP.status)>=0;
    if(isSameCol){
      // 只允許同優先順序內拖拉
      if(colKey!=="fin"&&priOrder(dragP)!==priOrder(targetP)){
        setDragId(null);setOverCol(null);setOverCardId(null);
        return;
      }
      var cards=sortCol(active.filter(function(p){return col.st.indexOf(p.status)>=0;}),colKey);
      var fromIdx=cards.findIndex(function(p){return p.id===dragId;});
      var toIdx=cards.findIndex(function(p){return p.id===targetId;});
      if(fromIdx<0||toIdx<0)return;
      var arr=cards.slice();arr.splice(fromIdx,1);arr.splice(toIdx,0,dragP);
      // 只更新同優先順序的卡片
      var samePri=colKey==="fin"?arr:arr.filter(function(p){return priOrder(p)===priOrder(dragP);});
      onReorder(samePri.map(function(p,i){return{id:p.id,kanbanPos:i};}));
    } else if(!isSameCol){
      onSC(dragId,col.st[0]);
    }
    setDragId(null);setOverCol(null);setOverCardId(null);
  }

  return h("div",{style:{overflowX:"auto",paddingBottom:12}},
    h("div",{style:{display:"flex",gap:10,minWidth:950,alignItems:"flex-start"}},
      KCOLS.map(function(col){
        var cards=sortCol(active.filter(function(p){return col.st.indexOf(p.status)>=0;}),col.key);

function CalView(props){
  var projects=props.projects,onEdit=props.onEdit,cColors=props.cColors;
  var now=new Date();
  var ms=useState(now.getMonth());var month=ms[0],setMonth=ms[1];

  var fs=useState({edit:false,cut1:true,v1:true,biz:true,due:false});var filters=fs[0],setFilters=fs[1];
  function togF(k){setFilters(function(f){var n=Object.assign({},f);n[k]=!f[k];return n;});}
  var dims=new Date(year,month+1,0).getDate(),fd=new Date(year,month,1).getDay();
  var cells=[];for(var i=0;i<fd;i++)cells.push(null);for(var i=1;i<=dims;i++)cells.push(i);
  function inR(ds,s,e){if(!ds||!s)return false;return ds>=s&&ds<=(e||s);}
  function getEv(d){
    if(!d)return[];

        ev.push({p:p,k:"r",label:"\u526a",color:cc,bg:cf,iS:ds===p.editS,iE:ds===(p.editE||p.editS)});
      // 初剪時程 (完成→灰 / 未完成→客戶色) + 交件點 (紅/灰)
      if(filters.cut1){
        if(!p.noCut1&&p.cut1S&&inR(ds,p.cut1S,p.cut1E||p.cut1S))
          ev.push({p:p,k:"r",label:"\u2702\ufe0f",color:p.cut1Done?GR:cc,bg:p.cut1Done?GRbg:cf,iS:ds===p.cut1S,iE:ds===(p.cut1E||p.cut1S)});
        if(!filters.due&&!p.noCut1&&p.cut1Due&&p.cut1Due===ds)
          ev.push({p:p,k:"d",label:"\u2702\ufe0f",color:p.cut1Done?GR:"#e08080"});
      }
      // ES時程 (完成→灰 / 未完成→客戶色) + 交件點 (橘/灰)
      if(filters.v1){
        if(p.v1S&&inR(ds,p.v1S,p.v1E||p.v1S))

      }
      // 業配時程 (完成→灰 / 未完成→客戶色) + 交件點 (藍/灰)
      if(filters.biz){

        if(p.v1Due&&p.v1Due===ds)

      h("button",{onClick:function(){if(month===11){setMonth(0);setYear(function(y){return y+1;});}else setMonth(function(m){return m+1;});},style:{background:C.card,border:"1px solid "+C.brd,color:C.txt2,borderRadius:8,padding:"5px 14px",cursor:"pointer",fontSize:16}},"\u203a")

        h("span",{style:{width:8,height:8,borderRadius:"50%",background:on?ft.color:C.brd2,display:"inline-block"}}),ft.label);})

// ── TODO VIEW ─────────────────────────────────────────────────────────────────
function TodoView(props){
  var projects=props.projects,onEdit=props.onEdit,cColors=props.cColors;
  var now=new Date();
  function daysUntil(dateStr){
    if(!dateStr)return null;
    var parts=dateStr.split("-");
    var d=new Date(Number(parts[0]),Number(parts[1])-1,Number(parts[2]));
    return Math.round((d-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/(1000*60*60*24));
  }
  function fmtDate(d){if(!d)return"";var p=d.split("-");return p[1]+"/"+p[2];}
  function nextDueInfo(p){
    var candidates=[];
    if(!p.noCut1&&!p.cut1Done&&p.cut1Due)candidates.push({date:p.cut1Due,label:"\u521d\u526a",icon:"\u2702\ufe0f"});
    if(!p.v1Done&&p.v1Due)candidates.push({date:p.v1Due,label:"ES",icon:"\u2728"});
    if(!p.noBiz&&!p.bizDone&&p.bizDue)candidates.push({date:p.bizDue,label:"\u696d\u914d",icon:"\ud83d\udcb0"});
    if(!p.finalDone&&p.finalDue)candidates.push({date:p.finalDue,label:"Final",icon:"\ud83c\udfac"});
    candidates.sort(function(a,b){return a.date.localeCompare(b.date);});
    return candidates[0]||null;
  }

  var waitingSt=["等待素材","待確認","暫緩"];
  var doneSt=["Final完成"];
  var active=projects.filter(function(p){return!p.closed&&waitingSt.indexOf(p.status)<0&&doneSt.indexOf(p.status)<0;});
  var withDue=[];
  var noDue=[];
  active.forEach(function(p){
    var info=nextDueInfo(p);
    if(info){withDue.push({p:p,info:info,days:daysUntil(info.date)});}
    else{noDue.push({p:p,info:null,days:9999});}
  });
  withDue.sort(function(a,b){return a.days-b.days;});

  var urgent=withDue.filter(function(x){return x.days<=1;});
  var thisWeek=withDue.filter(function(x){return x.days>1&&x.days<=7;});
  var later=withDue.filter(function(x){return x.days>7;}).concat(noDue);

  // 等素材案子
  var waiting=projects.filter(function(p){return!p.closed&&waitingSt.indexOf(p.status)>=0;})
    .sort(function(a,b){
      var da=a.editS||a.month||"9999";
      var db=b.editS||b.month||"9999";
      return da.localeCompare(db);
    });

  var counter=0;
  function num(){counter++;return counter;}

  function Row(rp){
    var x=rp.x,cc=cColors[x.p.client]||C.acc;
    var d=x.days;
    var dStr=d>=9999?"\u5c1a\u672a\u6392\u7a0b":d<0?"\u903e\u671f"+Math.abs(d)+"\u5929":d===0?"\u4eca\u5929":d===1?"\u660e\u5929":"\u5269"+d+"\u5929";
    var dColor=d>=9999?C.txt3:d<0?C.err:d<=1?"#e07010":C.txt2;
    var icon=x.info?x.info.icon:"\ud83d\udccc";
    var label=x.info?x.info.label+"\u0020"+fmtDate(x.info.date):x.p.status;
    return h("div",{onClick:function(){onEdit(x.p);},style:{display:"flex",alignItems:"center",gap:5,padding:"9px 10px",borderRadius:9,cursor:"pointer",background:C.card,border:"1px solid "+C.brd,marginBottom:7,borderLeft:"3px solid "+cc}},
      h("span",{style:{fontSize:12,color:C.txt3,fontWeight:700,minWidth:16,flexShrink:0}},rp.n+"."),
      h("span",{style:{fontSize:14,flexShrink:0}},icon),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:12,fontWeight:800,color:cc,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},x.p.client),
        h("div",{style:{fontSize:13,color:C.txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},x.p.airDate?x.p.airDate+" "+x.p.name:x.p.name)
      ),
      h("div",{style:{textAlign:"right",flexShrink:0,minWidth:60}},
        h("div",{style:{fontSize:12,fontWeight:700,color:dColor}},dStr),
        h("div",{style:{fontSize:10,color:C.txt3}},label)
      )
    );
  }

  function WaitRow(wp){
    var p=wp.p,cc=cColors[p.client]||C.acc;
    // 計算距離開始工作日
    var startDays=p.editS?daysUntil(p.editS):null;
    var startWarn=startDays!==null&&startDays<=3;
    var startColor=startDays!==null&&startDays<0?C.err:startDays<=1?"#e07010":startDays<=3?C.wrn:C.txt3;
    var startStr=startDays!==null?(startDays<0?"\u5de5\u4f5c\u5df2\u958b\u59cb"+Math.abs(startDays)+"\u5929":startDays===0?"\u4eca\u5929\u958b\u59cb\ud83d\udd25":startDays===1?"\u660e\u5929\u958b\u59cb\u26a0\ufe0f":"\u5269"+startDays+"\u5929\u958b\u59cb"):null;
    return h("div",{onClick:function(){onEdit(p);},style:{display:"flex",alignItems:"center",gap:5,padding:"9px 10px",borderRadius:9,cursor:"pointer",background:startWarn?C.wrnBg:C.card,border:"1px solid "+(startWarn?C.wrn:C.brd),marginBottom:7,borderLeft:"3px solid "+cc}},

      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:12,fontWeight:800,color:cc}},p.client),

// ── URGENT BANNER ─────────────────────────────────────────────────────────────
function UrgentBanner(props){
  var projects=props.projects,onEdit=props.onEdit;
  var urgent=[];
  projects.filter(function(p){return!p.closed;}).forEach(function(p){
    var checks=[
      {field:"cut1Done",date:!p.noCut1?p.cut1Due:null,label:"\u521d\u526a"},
      {field:"v1Done",date:p.v1Due,label:"V1"},
      {field:"bizDone",date:!p.noBiz?p.bizDue:null,label:"\u696d\u914d"},
      {field:"finalDone",date:p.finalDue,label:"Final"}
    ];
    checks.forEach(function(ck){
      if(!ck.date||p[ck.field])return;
      var d=dU(ck.date);
      if(d!==null&&d<=1)urgent.push({p:p,d:d,label:ck.label,date:ck.date});
    });
  });
  if(!urgent.length)return null;
  urgent.sort(function(a,b){return a.d-b.d;});
  return h("div",{style:{background:C.errBg,border:"1px solid #f0a8a8",borderRadius:9,padding:"8px 14px",marginBottom:10,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
    h("span",{style:{color:C.err,fontWeight:800,fontSize:12}},"\u26a0\ufe0f \u4ea4\u4ef6\u63d0\u9192"),
    urgent.map(function(u,i){
      var color=u.d<0?C.err:u.d===0?C.wrn:C.acc;
      var text=u.d<0?"\u903e\u671f"+Math.abs(u.d)+"\u5929":u.d===0?"\u4eca\u5929":"\u660e\u5929";
      return h("span",{key:i,onClick:function(){onEdit(u.p);},style:{fontSize:11,color:color,cursor:"pointer",fontWeight:700,background:"rgba(255,255,255,0.7)",borderRadius:6,padding:"2px 8px",border:"1px solid "+color+"44"}},text+" ["+u.label+"] "+u.p.name);
    })
  );
}

      setProjects(function(ps){
        var ex=ps.find(function(x){return x.id===final.id||x.notionId===final.notionId;});
        return ex?ps.map(function(x){return(x.id===final.id||x.notionId===final.notionId)?final:x;}):[].concat(ps,[final]);
      });
    });

    });

  // 換狀態 → Notion

      var updated=ps.map(function(p){return p.id===id?Object.assign({},p,{status:s}):p;});
      var p=updated.find(function(x){return x.id===id;});
      setTimeout(function(){if(p&&p.notionId)saveProject(p);},0);

  // 勾選欄位 → Notion
  var togP=useCallback(function(id,field,val){
    setProjects(function(ps){

        var n=Object.assign({},p);n[field]=val;return n;
      });
      var p=updated.find(function(x){return x.id===id;});
      setTimeout(function(){if(p&&p.notionId)saveProject(p);},0);
      return updated;
    });
  },[]);

  // 排序 → Notion
  var reorderP=useCallback(function(updates){
    setProjects(function(ps){
      var updated=ps.map(function(p){
        var u=updates.find(function(x){return x.id===p.id;});
        return u?Object.assign({},p,{kanbanPos:u.kanbanPos}):p;

      setTimeout(function(){

          var p=updated.find(function(x){return x.id===u.id;});
