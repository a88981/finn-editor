<!DOCTYPE html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>小玩x阿滴剪輯進度表</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#faf9f7;font-family:"Noto Sans TC","Noto Sans KR",system-ui,sans-serif;color:#2c3a45;min-height:100vh;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
</style>
</head><body>
<div id="root"></div>
<script>
(function(){
var _R=React,useState=_R.useState,useEffect=_R.useEffect,h=_R.createElement;

// ── 設定 ──────────────────────────────────────────────────────────
var API="/api/notion";
var CLIENT_NAME="\ud83d\udca7\u963f\u6ef4"; // 客戶名稱，可改

// ── 顏色 ──────────────────────────────────────────────────────────
var C={
  bg:"#faf9f7",card:"#ffffff",brd:"#C0D3D9",brd2:"#a8c0c8",
  txt:"#2c3a45",txt2:"#4a6070",txt3:"#7a9aaa",
  acc:"#FFD686",ok:"#6a9080",okBg:"#edf4f2",
  err:"#b06070",wrn:"#C0D3D9",wrnBg:"#f5f0e8"
};

// ── 進度顏色 ──────────────────────────────────────────────────────
var STATUS_COLOR={
  "\u7b49\u5f85\u7d20\u6750":"#C0D3D9",
  "\u5f85\u78ba\u8a8d":"#C0D3D9",
  "\u66ab\u7de9":"#C0D3D9",
  "\u521d\u526a\u5f85\u57f7\u884c":"#C0D3D9",
  "\u521d\u526a\u4e2d":"#C0D3D9",
  "\u521d\u526a\u4fee\u6539\u4e2d":"#C0D3D9",
  "\u521d\u526a\u5be9\u6838\u4e2d":"#FFD686",
  "ES\u88fd\u4f5c\u4e2d":"#FCE5B3",
  "ES\u4fee\u6539\u4e2d":"#FCE5B3",
  "V1\u88fd\u4f5c\u4e2d":"#FCE5B3",
  "V1\u4fee\u6539\u4e2d":"#FCE5B3",
  "\u767c\u5305\u5b57\u5e55":"#FCE5B3",
  "ES\u5be9\u6838\u4e2d":"#FFD686",
  "V1\u5be9\u6838\u4e2d":"#FFD686",
  "\u5ee0\u5546\u5be9\u6838\u4e2d":"#FFD686",
  "Final\u5be9\u6838\u4e2d":"#FFD686",
  "Final\u5b8c\u6210":"#FFD686",
};

function statusColor(s){return STATUS_COLOR[s]||"#aaa";}

function daysUntil(dateStr){
  if(!dateStr)return null;
  var p=dateStr.split("-");
  var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));
  var now=new Date();
  return Math.round((d-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/(1000*60*60*24));
}

function fmtDate(d){
  if(!d)return"";
  var p=d.split("-");
  return p[1]+"/"+p[2];
}

function DueTag(props){
  var date=props.date,done=props.done,icon=props.icon,label=props.label;
  if(!date)return null;
  var days=daysUntil(date);
  if(done)return h("div",{style:{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#bbb",textDecoration:"line-through"}},
    h("span",null,icon),h("span",null,label+" "+fmtDate(date)),h("span",{style:{fontSize:10}},"\u2713")
  );
  var color=days<0?C.err:days===0?"#e07010":days===1?"#d07010":days<=3?C.wrn:C.txt3;
  var dStr=days<0?"\u903e\u671f"+Math.abs(days)+"\u5929":days===0?"\u4eca\u5929":days===1?"\u660e\u5929":"\u5269"+days+"\u5929";
  return h("div",{style:{display:"flex",alignItems:"center",gap:4,fontSize:11,color:color,fontWeight:days<=1?700:400}},
    h("span",null,icon),
    h("span",null,label+" "+fmtDate(date)),
    h("span",{style:{fontSize:10,fontWeight:500}},dStr)
  );
}

function ProjectCard(props){
  var p=props.p;
  var waitingSt=["\u7b49\u5f85\u7d20\u6750","\u5f85\u78ba\u8a8d","\u66ab\u7de9"];
  var isWaiting=waitingSt.indexOf(p.status)>=0;
  var isDone=p.status==="Final\u5b8c\u6210";
  var sc=p.closed?"#c0bab0":isWaiting?"#d0ccc0":isDone?"#FFD686":statusColor(p.status);
  var typeIcon=p.type==="\u77ed\u5f71"?"\ud83d\udcf1":"\ud83c\udf9e\ufe0f";
  return h("div",{style:{background:p.closed?"#f5f5f5":C.card,borderRadius:12,padding:"16px",border:"0.5px solid #C0D3D9",borderLeft:"2.5px solid "+sc,opacity:p.closed?0.7:1}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
      h("div",null,
        p.airDate&&h("div",{style:{fontSize:11,color:C.txt3,marginBottom:2}},"\ud83d\udcc5 \u4e0a\u7247 "+p.airDate),
        h("div",{style:{fontSize:15,fontWeight:500,color:sc,lineHeight:1.3}},p.name)
      ),
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}},
        h("span",{style:{fontSize:12,background:sc+"18",color:sc,borderRadius:20,padding:"3px 10px",fontWeight:500,whiteSpace:"nowrap"}},p.status),
        h("span",{style:{fontSize:11,color:C.txt3}},typeIcon+" "+p.type+(p.length?" · "+p.length:""))
      )
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:6,marginTop:8,paddingTop:8,borderTop:"1px solid "+C.brd}},
      h(DueTag,{date:!p.noCut1?p.cut1Due:null,done:p.cut1Done,icon:"\u2702\ufe0f",label:"\u521d\u526a"}),
      h(DueTag,{date:p.v1Due,done:p.v1Done,icon:"\u2728",label:"ES"}),
      h(DueTag,{date:!p.noBiz?p.bizDue:null,done:p.bizDone,icon:"\ud83d\udcb0",label:"\u696d\u914d"}),
      h(DueTag,{date:p.finalDue,done:p.finalDone,icon:"\ud83c\udfac",label:"Final"})
    ),
    p.note&&h("div",{style:{marginTop:8,fontSize:11,color:C.txt3,paddingTop:8,borderTop:"1px solid "+C.brd}},"\ud83d\udcdd "+p.note)
  );
}

function ClosedCard(props){
  var p=props.p;
  return h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:"#faf9f7",border:"0.5px solid #C0D3D9",opacity:0.7}},
    h("span",{style:{fontSize:11}},"\ud83c\udfac"),
    h("div",{style:{flex:1,minWidth:0}},
      h("span",{style:{fontSize:12,fontWeight:500,color:"#888",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"block"}},
        (p.airDate?(p.month?p.month.slice(0,4):"")+"/"+p.airDate+" ":"")+p.name
      )
    )
  );
}

function App(){
  var ps=useState([]);var projects=ps[0],setProjects=ps[1];
  var ls=useState(true);var loading=ls[0],setLoading=ls[1];
  var es=useState(null);var error=es[0],setError=es[1];

  useEffect(function(){
    fetch(API+"?action=list")
      .then(function(r){return r.json();})
      .then(function(data){
        var filtered=(data||[]).filter(function(p){return p.client===CLIENT_NAME;});
        // 按進度排序
        var order={"Final\u5b8c\u6210":98,"":99};
        filtered.sort(function(a,b){
          if(a.closed&&!b.closed)return 1;
          if(!a.closed&&b.closed)return-1;
          var oa=order[a.status]!==undefined?order[a.status]:0,ob=order[b.status]!==undefined?order[b.status]:0;
          if(oa!==ob)return oa-ob;
          function nd(p){var dates=[];if(!p.noCut1&&!p.cut1Done&&p.cut1Due)dates.push(p.cut1Due);if(!p.v1Done&&p.v1Due)dates.push(p.v1Due);if(!p.noBiz&&!p.bizDone&&p.bizDue)dates.push(p.bizDue);if(!p.finalDone&&p.finalDue)dates.push(p.finalDue);dates.sort();return dates[0]||"9999";}
          return nd(a).localeCompare(nd(b));
        });
        setProjects(filtered);
        setLoading(false);
      })
      .catch(function(e){
        setError("\u8f09\u5165\u5931\u6557\uff0c\u8acb\u7a0d\u5f8c\u518d\u8a66");
        setLoading(false);
      });
  },[]);

  var waitingSt=["\u7b49\u5f85\u7d20\u6750","\u5f85\u78ba\u8a8d","\u66ab\u7de9"];
  var doneSt=["Final\u5b8c\u6210"];
  var os=useState(true);var showDone=os[0],setShowDone=os[1];
  var cs=useState(false);var showClosed=cs[0],setShowClosed=cs[1];

  var closed=projects.filter(function(p){return p.closed;}).sort(function(a,b){return(b.airDate||"").localeCompare(a.airDate||"");});
  var waiting=projects.filter(function(p){return!p.closed&&waitingSt.indexOf(p.status)>=0;}).sort(function(a,b){return(a.airDate||"9999").localeCompare(b.airDate||"9999");});
  var done=projects.filter(function(p){return!p.closed&&doneSt.indexOf(p.status)>=0;}).sort(function(a,b){return(b.airDate||"").localeCompare(a.airDate||"");});
  var reviewSt=["\u521d\u526a\u5be9\u6838\u4e2d","ES\u5be9\u6838\u4e2d","V1\u5be9\u6838\u4e2d","\u5ee0\u5546\u5be9\u6838\u4e2d","Final\u5be9\u6838\u4e2d"];
  var active=projects.filter(function(p){return!p.closed&&waitingSt.indexOf(p.status)<0&&doneSt.indexOf(p.status)<0;}).sort(function(a,b){
    var ar=reviewSt.indexOf(a.status)>=0,br=reviewSt.indexOf(b.status)>=0;
    if(ar&&!br)return 1;
    if(!ar&&br)return-1;
    function nd(p){var dates=[];if(!p.noCut1&&!p.cut1Done&&p.cut1Due)dates.push(p.cut1Due);if(!p.v1Done&&p.v1Due)dates.push(p.v1Due);if(!p.noBiz&&!p.bizDone&&p.bizDue)dates.push(p.bizDue);if(!p.finalDone&&p.finalDue)dates.push(p.finalDue);dates.sort();return dates[0]||"9999";}
    return nd(a).localeCompare(nd(b));
  });

  return h("div",{style:{maxWidth:600,margin:"0 auto",padding:"20px 16px"}},
    h("div",{style:{marginBottom:24,paddingBottom:16,borderBottom:"1.5px solid "+C.acc}},
      h("div",{style:{fontSize:22,fontWeight:500,color:"#7a9ab0"}},"\ud83c\udfac \u5c0f\u73a9x\u963f\u6ef4\u526a\u8f2f\u9032\u5ea6\u8868"),
    ),
    loading&&h("div",{style:{textAlign:"center",padding:"40px",color:C.txt3}},"\u8f09\u5165\u4e2d\u2026"),
    error&&h("div",{style:{textAlign:"center",padding:"40px",color:C.err}},error),
    !loading&&!error&&h("div",{style:{display:"flex",flexDirection:"column",gap:20}},
      // 進行中
      h("div",null,
        h("div",{style:{fontSize:13,fontWeight:500,color:"#b08080",marginBottom:10,display:"flex",alignItems:"center",gap:6}},
          h("span",null,"\u2702\ufe0f \u9032\u884c\u4e2d"),
          h("span",{style:{fontSize:11,background:"#C0D3D9",color:"#4a6070",borderRadius:12,padding:"1px 8px",fontWeight:500}},active.length)
        ),
        active.length>0
          ?h("div",{style:{display:"flex",flexDirection:"column",gap:10}},active.map(function(p){return h(ProjectCard,{key:p.id,p:p});}))
          :h("div",{style:{fontSize:12,color:C.txt3,padding:"8px 0"}},"\u76ee\u524d\u6c92\u6709\u9032\u884c\u4e2d\u7684\u5c08\u6848")
      ),
      // 等待執行
      h("div",null,
        h("div",{style:{fontSize:13,fontWeight:500,color:"#7a9ab0",marginBottom:10,display:"flex",alignItems:"center",gap:6}},
          h("span",null,"\u23f3 \u5f85\u57f7\u884c"),
          h("span",{style:{fontSize:11,background:"#C0D3D9",color:"#4a6070",borderRadius:12,padding:"1px 8px",fontWeight:500}},waiting.length)
        ),
        waiting.length>0
          ?h("div",{style:{display:"flex",flexDirection:"column",gap:10}},waiting.map(function(p){return h(ProjectCard,{key:p.id,p:p});}))
          :h("div",{style:{fontSize:12,color:C.txt3,padding:"8px 0"}},"\u6c92\u6709\u7b49\u5f85\u57f7\u884c\u7684\u5c08\u6848")
      ),
      // 已完成（可收起）
      h("div",null,
        h("div",{onClick:function(){setShowDone(function(v){return!v;});},style:{fontSize:13,fontWeight:500,color:"#9088b0",marginBottom:showDone?10:0,display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}},
          h("span",null,"\ud83c\udfac \u5df2\u5b8c\u6210"),
          h("span",{style:{fontSize:11,background:"#f0ebff",color:"#FFD686",borderRadius:12,padding:"1px 8px",fontWeight:500}},done.length),
          h("span",{style:{fontSize:11,color:"#FFD686",marginLeft:"auto"}},showDone?"\u25b4":"\u25be")
        ),
        showDone&&(done.length>0
          ?h("div",{style:{display:"flex",flexDirection:"column",gap:10}},done.map(function(p){return h(ProjectCard,{key:p.id,p:p});}))
          :h("div",{style:{fontSize:12,color:C.txt3,padding:"8px 0"}},"\u6c92\u6709\u5df2\u5b8c\u6210\u7684\u5c08\u6848"))
      ),
      // 已結案（可收起）
      closed.length>0&&h("div",null,
        h("div",{onClick:function(){setShowClosed(function(v){return!v;});},style:{fontSize:13,fontWeight:500,color:C.txt3,marginBottom:showClosed?10:0,display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none",padding:"8px 12px",background:"#f5f5f5",borderRadius:8,border:"1px solid #eee"}},
          h("span",null,"\ud83d\udcc2 \u5df2\u7d50\u6848"),
          h("span",{style:{fontSize:11,background:"#C0D3D9",color:"#4a6070",borderRadius:12,padding:"1px 8px",fontWeight:500}},closed.length),
          h("span",{style:{fontSize:11,color:C.txt3,marginLeft:"auto"}},showClosed?"\u25b4 \u6536\u8d77":"\u25be \u9ede\u64ca\u5c55\u958b")
        ),
        showClosed&&h("div",{style:{display:"flex",flexDirection:"column",gap:4,marginTop:10}},closed.map(function(p){return h(ClosedCard,{key:p.id,p:p});}))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
</script>
</body></html>
