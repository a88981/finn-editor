<!DOCTYPE html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>小玩 × 阿滴｜剪輯進度表</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#FAFAF7;font-family:"Noto Sans TC","Inter",system-ui,sans-serif;color:#1A1F2E;min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#E5E7ED;border-radius:2px;}
.italic-en{font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:400;}
.serif{font-family:"Noto Serif TC",serif;}
.label-en{font-family:"Inter",sans-serif;letter-spacing:0.25em;text-transform:uppercase;font-weight:500;}
.waiting-list > div:last-child{border-bottom:none !important;}

/* 手機版：進度區的日期 + 倒數改成兩行堆疊，避免擠在一行 */
@media (max-width:520px){
  .stage-info{flex-direction:column !important;gap:3px !important;}
}
</style>
</head><body>
<div id="root"></div>
<script>
(function(){
var _R=React,useState=_R.useState,useEffect=_R.useEffect,h=_R.createElement;

// ── 設定 ──────────────────────────────────────────────────────────
var API="/api/notion";
var CLIENT_NAME="\ud83d\udca7\u963f\u6ef4";

// ── 顏色（沿用報價表色系）─────────────────────────────────────────
var C={
  blue:"#1E3A6F",
  blueMid:"#4A6FA8",
  blueSoft:"#C9D7EC",
  bluePale:"#EEF3FA",
  yellow:"#FFF4D1",
  yellowSoft:"#FCE99A",
  yellowPale:"#FFF8DC",
  ink:"#1A1F2E",
  inkSoft:"#5A6275",
  inkLight:"#9BA1B0",
  paper:"#FAFAF7",
  card:"#FFFFFF",
  line:"#E5E7ED",
  lineSoft:"#F0F2F6"
};

// ── 進度顏色（重新對應到藍黃色系）──────────────────────────────────
// 等待類 → 灰藍中性
// 進行類 → 主藍
// 完成類 → 黃金
var STATUS_COLOR={
  "\u7b49\u5f85\u7d20\u6750":C.inkLight,
  "\u5f85\u78ba\u8a8d":C.inkLight,
  "\u66ab\u7de9":C.inkLight,
  "\u521d\u526a\u5f85\u57f7\u884c":C.blueMid,
  "\u521d\u526a\u4e2d":C.blueMid,
  "\u521d\u526a\u4fee\u6539\u4e2d":C.blueMid,
  "\u521d\u526a\u5be9\u6838\u4e2d":C.blueMid,
  "ES\u88fd\u4f5c\u4e2d":C.blue,
  "ES\u4fee\u6539\u4e2d":C.blue,
  "V1\u88fd\u4f5c\u4e2d":C.blue,
  "V1\u4fee\u6539\u4e2d":C.blue,
  "\u767c\u5305\u5b57\u5e55":C.blue,
  "ES\u5be9\u6838\u4e2d":C.blue,
  "V1\u5be9\u6838\u4e2d":C.blue,
  "\u5ee0\u5546\u5be9\u6838\u4e2d":C.blue,
  "Final\u5be9\u6838\u4e2d":C.blue,
  "Final\u5b8c\u6210":"#7A8090"
};

function statusColor(s){return STATUS_COLOR[s]||C.inkLight;}

function daysUntil(dateStr){
  if(!dateStr)return null;
  var p=dateStr.split("-");
  var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));
  var now=new Date();
  return Math.round((d-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/(1000*60*60*24));
}

function fmtDate(d){
  if(!d)return"";
  var p=d.split("-");
  return p[1]+"/"+p[2];
}

function DueTag(props){
  var date=props.date,done=props.done,icon=props.icon,label=props.label;
  if(!date)return null;
  var days=daysUntil(date);
  if(done)return h("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:12.5,color:C.inkLight,textDecoration:"line-through"}},
    h("span",{style:{fontSize:11}},icon),h("span",null,label+" "+fmtDate(date)),h("span",{style:{fontSize:10,color:"#7A8090"}},"\u2713")
  );
  // 緊急度
  var isUrgent=days<=1;
  var color=days<0?C.blue:days<=1?C.blue:days<=3?C.blueMid:C.inkSoft;
  var weight=days<=1?500:400;
  var bigNum,smallTxt;
  if(days<0){bigNum=Math.abs(days);smallTxt="\u903e\u671f\u3000\u5929";}
  else if(days===0){bigNum=null;smallTxt="\u4eca\u5929";}
  else if(days===1){bigNum=null;smallTxt="\u660e\u5929";}
  else {bigNum=days;smallTxt="\u5269  \u5929";}
  var urgentStyle=isUrgent?{background:C.yellow,color:C.ink,padding:"2px 8px",borderRadius:2,marginLeft:4,display:"inline-flex",alignItems:"baseline",gap:3,fontWeight:600}:{marginLeft:4,display:"inline-flex",alignItems:"baseline",gap:3};
  var dStrNodes;
  if(bigNum===null){
    dStrNodes=h("span",{className:isUrgent?"":"italic-en",style:Object.assign({},urgentStyle,{fontSize:isUrgent?12:13,fontWeight:isUrgent?600:weight,opacity:isUrgent?1:0.95})},smallTxt);
  } else if(days<0){
    dStrNodes=h("span",{style:urgentStyle},
      h("span",{style:{fontSize:11.5,opacity:isUrgent?0.95:0.85}},"\u903e\u671f"),
      h("span",{className:"italic-en",style:{fontSize:isUrgent?16:18,fontWeight:isUrgent?700:600,lineHeight:1}},bigNum),
      h("span",{style:{fontSize:11.5,opacity:isUrgent?0.95:0.85}},"\u5929")
    );
  } else {
    dStrNodes=h("span",{style:urgentStyle},
      h("span",{style:{fontSize:11.5,opacity:isUrgent?0.95:0.85}},"\u5269"),
      h("span",{className:"italic-en",style:{fontSize:isUrgent?16:18,fontWeight:isUrgent?700:600,lineHeight:1}},bigNum),
      h("span",{style:{fontSize:11.5,opacity:isUrgent?0.95:0.85}},"\u5929")
    );
  }
  return h("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:12.5,color:isUrgent?C.ink:color,fontWeight:weight}},
    h("span",{style:{fontSize:11,opacity:0.7}},icon),
    h("span",null,label+" "+fmtDate(date)),
    dStrNodes
  );
}

function ProjectCard(props){
  var p=props.p;
  var waitingSt=["\u7b49\u5f85\u7d20\u6750","\u5f85\u78ba\u8a8d","\u66ab\u7de9"];
  var isWaiting=waitingSt.indexOf(p.status)>=0;
  var isDone=p.status==="Final\u5b8c\u6210";
  var sc=p.closed?C.inkLight:statusColor(p.status);
  var typeIcon=p.type==="\u77ed\u5f71"?"\ud83d\udcf1":"\ud83c\udf9e";
  var cardBg=p.closed?"#F5F5F2":isDone?"#EFEFEC":C.card;
  var borderLeft="2px solid "+sc;

  // 進度條：四個里程碑（帶日期 + 各自顏色）
  // 顏色由淺到深：每個階段越往後越深，視覺上是「越接近完成 = 越濃」
  var STAGE_COLORS={
    "\u521d\u526a":"#7BA3D9",      // 淺藍
    "ES":"#4A6FA8",                  // 中藍（同 C.blueMid）
    "\u696d\u914d":"#B89642",      // 暖金
    "Final":"#1E3A6F"                // 深藍（同 C.blue）
  };
  function calcProgress(){
    var stages=[];
    if(!p.noCut1)stages.push({done:!!p.cut1Done,label:"\u521d\u526a",due:p.cut1Due,color:STAGE_COLORS["\u521d\u526a"]});
    stages.push({done:!!p.v1Done,label:"ES",due:p.v1Due,color:STAGE_COLORS["ES"]});
    if(!p.noBiz)stages.push({done:!!p.bizDone,label:"\u696d\u914d",due:p.bizDue,color:STAGE_COLORS["\u696d\u914d"]});
    stages.push({done:!!p.finalDone,label:"Final",due:p.finalDue,color:STAGE_COLORS["Final"]});
    return stages;
  }
  var stages=calcProgress();
  var doneCount=stages.filter(function(s){return s.done;}).length;
  var showProgress=!p.closed&&!isWaiting;

  // 每個 stage 的倒數資訊
  function stageCountdown(s){
    if(!s.due)return null;
    if(s.done)return{text:"\u2713",done:true};
    var d=daysUntil(s.due);
    if(d===null)return null;
    if(d<0)return{n:Math.abs(d),pre:"\u903e\u671f",urgent:true};
    if(d===0)return{text:"\u4eca\u5929",urgent:true,solo:true};
    if(d===1)return{text:"\u660e\u5929",urgent:true,solo:true};
    return{n:d,pre:"\u5269",urgent:d<=3};
  }

  return h("div",{style:{background:cardBg,borderRadius:4,padding:"16px 18px",border:"1px solid "+C.line,borderLeft:borderLeft,opacity:p.closed?0.65:1,transition:"all 0.2s"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:12}},
      h("div",{style:{minWidth:0,flex:1}},
        p.airDate&&h("div",{className:"label-en",style:{fontSize:9.5,color:C.inkLight,marginBottom:4}},"AIR \u00b7 "+p.airDate),
        h("div",{className:"serif",style:{fontSize:15,fontWeight:500,color:C.ink,lineHeight:1.35,letterSpacing:"0.01em"}},p.name)
      ),
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}},
        h("span",{style:{fontSize:11,background:sc+"15",color:sc,borderRadius:2,padding:"3px 10px",fontWeight:500,whiteSpace:"nowrap",letterSpacing:"0.05em",border:"1px solid "+sc+"30"}},p.status),
        h("span",{style:{fontSize:10.5,color:C.inkLight,letterSpacing:"0.02em"}},typeIcon+" "+p.type+(p.length?" \u00b7 "+p.length:""))
      )
    ),
    // 進度條 + 整合資訊
    showProgress&&h("div",{style:{marginTop:12,paddingTop:12,borderTop:"1px dashed "+C.line}},
      // header
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        h("span",{className:"label-en",style:{fontSize:9,color:C.inkLight}},"Progress"),
        doneCount===stages.length
          ?h("span",{className:"italic-en",style:{fontSize:12,color:C.ink,fontWeight:500,background:C.yellow,padding:"1px 8px",borderRadius:2}},doneCount+" / "+stages.length)
          :h("span",{className:"italic-en",style:{fontSize:12,color:sc,fontWeight:500}},doneCount+" / "+stages.length)
      ),
      // 進度條 bar
      h("div",{style:{display:"flex",gap:3,marginBottom:8}},stages.map(function(s,i){
        return h("div",{key:i,style:{flex:1,height:5,borderRadius:2,background:s.done?s.color:C.lineSoft,transition:"all 0.3s"}});
      })),
      // 整合的文字資訊：label + (日期 + 倒數同行)
      h("div",{style:{display:"flex",gap:3}},stages.map(function(s,i){
        var cd=stageCountdown(s);
        return h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,textAlign:"center",minWidth:0}},
          // label - 用各自階段色
          h("div",{style:{fontSize:13,color:s.done?C.inkLight:s.color,fontWeight:s.done?400:500,letterSpacing:"0.02em",textDecoration:s.done?"line-through":"none"}},s.label),
          // 日期 + 倒數同一行（手機自動兩行）
          s.due&&h("div",{className:"stage-info",style:{display:"inline-flex",alignItems:"baseline",gap:6,flexWrap:"nowrap",justifyContent:"center"}},
            h("span",{className:"serif",style:{fontSize:14,fontWeight:500,color:s.done?C.inkLight:C.ink,lineHeight:1,letterSpacing:"0.02em",textDecoration:s.done?"line-through":"none"}},fmtDate(s.due)),
            cd&&(cd.done
              ?h("span",{style:{fontSize:12,color:C.inkLight}},"\u2713")
              :cd.urgent
                ?h("span",{style:{background:C.yellow,color:C.ink,padding:"1px 6px",borderRadius:2,fontWeight:600,display:"inline-flex",alignItems:"baseline",gap:2}},
                    cd.solo
                      ?h("span",{style:{fontSize:12}},cd.text)
                      :[h("span",{key:"p",style:{fontSize:11}},cd.pre),h("span",{key:"n",className:"italic-en",style:{fontSize:15,fontWeight:700,lineHeight:1}},cd.n),h("span",{key:"d",style:{fontSize:11}},"\u5929")]
                  )
                :h("span",{style:{display:"inline-flex",alignItems:"baseline",gap:2,color:s.color}},
                    h("span",{style:{fontSize:11}},cd.pre),
                    h("span",{className:"italic-en",style:{fontSize:15,fontWeight:600,lineHeight:1}},cd.n),
                    h("span",{style:{fontSize:11}},"\u5929")
                  )
            )
          )
        );
      }))
    ),
    // 非進行中（已完成）的卡片：保留原本 DueTag 列表
    !showProgress&&!p.closed&&h("div",{style:{display:"flex",flexDirection:"column",gap:7,marginTop:10,paddingTop:10,borderTop:"1px dashed "+C.line}},
      h(DueTag,{date:!p.noCut1?p.cut1Due:null,done:p.cut1Done,icon:"\u2702",label:"\u521d\u526a"}),
      h(DueTag,{date:p.v1Due,done:p.v1Done,icon:"\u2726",label:"ES"}),
      h(DueTag,{date:!p.noBiz?p.bizDue:null,done:p.bizDone,icon:"\u25c6",label:"\u696d\u914d"}),
      h(DueTag,{date:p.finalDue,done:p.finalDone,icon:"\u25cf",label:"Final"})
    ),
    p.note&&h("div",{style:{marginTop:10,fontSize:11.5,color:C.inkSoft,paddingTop:10,borderTop:"1px dashed "+C.line,lineHeight:1.55,letterSpacing:"0.02em"}},
      h("span",{className:"italic-en",style:{color:C.blueMid,marginRight:4}},"note \u2014"),p.note
    )
  );
}

function ClosedCard(props){
  var p=props.p;
  return h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:3,background:"#F5F5F2",border:"1px solid "+C.line,opacity:0.7}},
    h("span",{className:"italic-en",style:{fontSize:12,color:C.blueMid,flexShrink:0}},"\u2014"),
    h("div",{style:{flex:1,minWidth:0}},
      h("span",{className:"serif",style:{fontSize:12.5,fontWeight:400,color:C.inkSoft,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"block"}},
        (p.airDate?(p.month?p.month.slice(0,4):"")+"/"+p.airDate+" ":"")+p.name
      )
    )
  );
}

// 待執行用：簡化單行列表
function WaitingRow(props){
  var p=props.p;
  var sc=statusColor(p.status);
  return h("div",{style:{display:"grid",gridTemplateColumns:"auto 1fr auto",alignItems:"center",gap:14,padding:"11px 16px",borderBottom:"1px dashed "+C.line}},
    h("span",{className:"italic-en",style:{fontSize:13,color:C.inkLight,whiteSpace:"nowrap",minWidth:56}},p.airDate?"AIR "+p.airDate.replace("-","/"):"\u2014"),
    h("span",{className:"serif",style:{fontSize:13.5,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",letterSpacing:"0.01em"}},p.name),
    h("span",{style:{fontSize:10.5,color:sc,padding:"2px 8px",border:"1px solid "+sc+"40",borderRadius:2,whiteSpace:"nowrap",letterSpacing:"0.05em"}},p.status)
  );
}

function SectionHeader(props){
  var num=props.num,label=props.label,en=props.en,count=props.count,color=props.color,onClick=props.onClick,collapsed=props.collapsed;
  return h("div",{onClick:onClick,style:{display:"flex",alignItems:"center",gap:10,marginBottom:onClick&&collapsed?0:12,cursor:onClick?"pointer":"default",userSelect:"none",paddingBottom:onClick&&collapsed?0:0}},
    h("span",{className:"italic-en",style:{fontSize:14,color:color,fontWeight:400}},num),
    h("span",{className:"label-en",style:{fontSize:10.5,color:C.inkSoft}},label),
    h("span",{className:"italic-en",style:{fontSize:13,color:C.inkLight,fontWeight:300}},"/ "+en),
    h("span",{className:"italic-en",style:{fontSize:13,color:color,marginLeft:"auto",fontWeight:500}},"("+count+")"),
    onClick&&h("span",{style:{fontSize:10,color:C.inkLight,marginLeft:4}},collapsed?"\u25be":"\u25b4")
  );
}

function App(){
  var ps=useState([]);var projects=ps[0],setProjects=ps[1];
  var ls=useState(true);var loading=ls[0],setLoading=ls[1];
  var es=useState(null);var error=es[0],setError=es[1];

  useEffect(function(){
    fetch(API+"?action=list")
      .then(function(r){return r.json();})
      .then(function(data){
        var filtered=(data||[]).filter(function(p){return p.client===CLIENT_NAME;});
        var order={"Final\u5b8c\u6210":98,"":99};
        filtered.sort(function(a,b){
          if(a.closed&&!b.closed)return 1;
          if(!a.closed&&b.closed)return-1;
          var oa=order[a.status]!==undefined?order[a.status]:0,ob=order[b.status]!==undefined?order[b.status]:0;
          if(oa!==ob)return oa-ob;
          function nd(p){var dates=[];if(!p.noCut1&&!p.cut1Done&&p.cut1Due)dates.push(p.cut1Due);if(!p.v1Done&&p.v1Due)dates.push(p.v1Due);if(!p.noBiz&&!p.bizDone&&p.bizDue)dates.push(p.bizDue);if(!p.finalDone&&p.finalDue)dates.push(p.finalDue);dates.sort();return dates[0]||"9999";}
          return nd(a).localeCompare(nd(b));
        });
        setProjects(filtered);
        setLoading(false);
      })
      .catch(function(e){
        setError("\u8f09\u5165\u5931\u6557\uff0c\u8acb\u7a0d\u5f8c\u518d\u8a66");
        setLoading(false);
      });
  },[]);

  var waitingSt=["\u7b49\u5f85\u7d20\u6750","\u5f85\u78ba\u8a8d","\u66ab\u7de9"];
  var doneSt=["Final\u5b8c\u6210"];
  var os=useState(true);var showDone=os[0],setShowDone=os[1];
  var cs=useState(false);var showClosed=cs[0],setShowClosed=cs[1];

  var closed=projects.filter(function(p){return p.closed;}).sort(function(a,b){return(b.airDate||"").localeCompare(a.airDate||"");});
  var waiting=projects.filter(function(p){return!p.closed&&waitingSt.indexOf(p.status)>=0;}).sort(function(a,b){return(a.airDate||"9999").localeCompare(b.airDate||"9999");});
  var done=projects.filter(function(p){return!p.closed&&doneSt.indexOf(p.status)>=0;}).sort(function(a,b){return(b.airDate||"").localeCompare(a.airDate||"");});
  var reviewSt=["\u521d\u526a\u5be9\u6838\u4e2d","ES\u5be9\u6838\u4e2d","V1\u5be9\u6838\u4e2d","\u5ee0\u5546\u5be9\u6838\u4e2d","Final\u5be9\u6838\u4e2d"];
  var active=projects.filter(function(p){return!p.closed&&waitingSt.indexOf(p.status)<0&&doneSt.indexOf(p.status)<0;}).sort(function(a,b){
    var ar=reviewSt.indexOf(a.status)>=0,br=reviewSt.indexOf(b.status)>=0;
    if(ar&&!br)return 1;
    if(!ar&&br)return-1;
    function nd(p){var dates=[];if(!p.noCut1&&!p.cut1Done&&p.cut1Due)dates.push(p.cut1Due);if(!p.v1Done&&p.v1Due)dates.push(p.v1Due);if(!p.noBiz&&!p.bizDone&&p.bizDue)dates.push(p.bizDue);if(!p.finalDone&&p.finalDue)dates.push(p.finalDue);dates.sort();return dates[0]||"9999";}
    return nd(a).localeCompare(nd(b));
  });

  return h("div",{style:{maxWidth:640,margin:"0 auto",padding:"32px 20px 60px"}},
    // Header
    h("div",{style:{marginBottom:28,paddingBottom:18,borderBottom:"1px solid "+C.line}},
      h("div",{className:"label-en",style:{fontSize:10,color:C.blue,marginBottom:10}},"Editing Schedule \u00b7 2026"),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:16,flexWrap:"wrap"}},
        h("div",{className:"serif",style:{fontSize:24,fontWeight:500,color:C.ink,lineHeight:1.25,letterSpacing:"-0.01em"}},
          "\u5c0f\u73a9",
          h("span",{className:"italic-en",style:{color:C.blueMid,fontWeight:300,margin:"0 6px"}},"\u00d7"),
          "\u963f\u6ef4\u3000",
          h("span",{style:{position:"relative",display:"inline-block"}},
            h("span",{style:{position:"absolute",left:-2,right:-2,bottom:3,height:10,background:C.yellow,opacity:0.85,zIndex:0,transform:"rotate(-0.8deg)"}}),
            h("span",{style:{position:"relative",zIndex:1}},"\u526a\u8f2f\u9032\u5ea6\u8868")
          )
        ),
        h("span",{className:"italic-en",style:{fontSize:14,color:C.inkLight,fontWeight:300}},"Progress Tracker")
      )
    ),
    loading&&h("div",{className:"italic-en",style:{textAlign:"center",padding:"60px 0",color:C.inkLight,fontSize:15}},"loading\u2026"),
    error&&h("div",{style:{textAlign:"center",padding:"40px 20px",color:C.blue,background:C.yellowPale,borderLeft:"3px solid "+C.yellow,fontSize:13}},error),
    !loading&&!error&&h("div",{style:{display:"flex",flexDirection:"column",gap:28}},

      // 進行中
      h("div",null,
        h(SectionHeader,{num:"01",label:"\u9032\u884c\u4e2d",en:"In Progress",count:active.length,color:C.blue}),
        active.length>0
          ?h("div",{style:{display:"flex",flexDirection:"column",gap:10}},active.map(function(p){return h(ProjectCard,{key:p.id,p:p});}))
          :h("div",{style:{fontSize:12,color:C.inkLight,padding:"12px 16px",background:C.bluePale,borderRadius:3,fontStyle:"italic",fontFamily:"Cormorant Garamond, serif"}},"\u2014 no active projects")
      ),

      // 等待執行 - 簡化列表
      h("div",null,
        h(SectionHeader,{num:"02",label:"\u5f85\u57f7\u884c",en:"Pending",count:waiting.length,color:C.blueMid}),
        waiting.length>0
          ?h("div",{className:"waiting-list",style:{display:"flex",flexDirection:"column",background:"#FAFAF7",border:"1px solid "+C.line,borderRadius:4,overflow:"hidden"}},waiting.map(function(p){return h(WaitingRow,{key:p.id,p:p});}))
          :h("div",{style:{fontSize:12,color:C.inkLight,padding:"12px 16px",background:C.bluePale,borderRadius:3,fontStyle:"italic",fontFamily:"Cormorant Garamond, serif"}},"\u2014 no pending projects")
      ),

      // 已完成（可收起）
      h("div",null,
        h(SectionHeader,{num:"03",label:"\u5df2\u5b8c\u6210",en:"Completed",count:done.length,color:"#7A8090",onClick:function(){setShowDone(function(v){return!v;});},collapsed:!showDone}),
        showDone&&(done.length>0
          ?h("div",{style:{display:"flex",flexDirection:"column",gap:10,marginTop:12}},done.map(function(p){return h(ProjectCard,{key:p.id,p:p});}))
          :h("div",{style:{fontSize:12,color:C.inkLight,padding:"12px 16px",marginTop:12,background:"#F0F0EC",borderLeft:"3px solid #C8C8C2",fontStyle:"italic",fontFamily:"Cormorant Garamond, serif"}},"\u2014 no completed projects"))
      ),

      // 已結案（可收起）
      closed.length>0&&h("div",null,
        h(SectionHeader,{num:"04",label:"\u5df2\u7d50\u6848",en:"Archived",count:closed.length,color:C.inkLight,onClick:function(){setShowClosed(function(v){return!v;});},collapsed:!showClosed}),
        showClosed&&h("div",{style:{display:"flex",flexDirection:"column",gap:5,marginTop:12}},closed.map(function(p){return h(ClosedCard,{key:p.id,p:p});}))
      )
    ),

    // Footer
    !loading&&!error&&h("div",{style:{marginTop:48,paddingTop:20,borderTop:"1px solid "+C.line,display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("span",{className:"label-en",style:{fontSize:9,color:C.inkLight}},"Editing Schedule"),
      h("span",{className:"italic-en",style:{fontSize:13,color:C.inkLight}},"\u5c0f\u73a9 studio")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
</script>
</body></html>
