<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱ 工作日誌</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#E8B340;--yellow-mid:#B8862A;--yellow-soft:#F5E6B8;--yellow-pale:#FFF8DC;--yellow-lightest:#FFFBEC;
  --ink:#1A1F2E;--ink-soft:#5A6275;--ink-light:#9BA1B0;
  --paper:#FAFAF7;--line:#E5E7ED;--line-soft:#F0F2F6;
  --green:#5a8a3a;--red:#A32D2D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#E8E8E2;color:var(--ink);font-family:'Noto Sans TC','Inter',sans-serif;font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
.viewport{padding:32px 16px 60px;display:flex;justify-content:center}
.a4{width:100%;max-width:560px;background:var(--paper);padding:32px 36px 28px;position:relative;box-shadow:0 1px 2px rgba(0,0,0,0.04),0 20px 60px rgba(180,140,40,0.10),0 8px 20px rgba(180,140,40,0.05);display:flex;flex-direction:column}

.corner-l{position:absolute;top:22px;left:36px;font-family:'Inter',sans-serif;font-size:10px;color:var(--ink-light);letter-spacing:0.3em;text-transform:uppercase;font-weight:500}
.corner-r{position:absolute;top:22px;right:36px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--ink-light)}

/* Settings gear menu */
.gear-btn{position:absolute;top:18px;right:80px;width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--ink-light);font-size:16px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;border-radius:3px}
.gear-btn:hover{background:var(--yellow-lightest);color:var(--yellow-mid)}
.gear-menu{position:absolute;top:50px;right:36px;background:#fff;border:1px solid var(--line);border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,0.08);z-index:50;min-width:160px;padding:4px 0}
.gear-item{display:block;width:100%;padding:9px 16px;background:transparent;border:none;text-align:left;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink);cursor:pointer}
.gear-item:hover{background:var(--yellow-lightest);color:var(--yellow-mid)}
.gear-item .en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--ink-light);margin-left:6px}
.gear-divider{height:1px;background:var(--line);margin:4px 0}

/* 上下班打卡條 */
.clock-bar{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:4px;padding:13px 16px;margin-bottom:14px;gap:14px}
.clock-bar.working{border-left:3px solid var(--green)}
.clock-bar.on-break{border-left:3px solid #d8903a;background:#fff7e8}
.clock-info{flex:1;min-width:0}
.clock-status{font-family:Inter,sans-serif;font-size:9.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-light);font-weight:500;margin-bottom:3px}
.clock-status.live{color:var(--green)}
.clock-status.break{color:#d8903a}
.clock-time{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--ink-soft);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:0.02em}
.clock-time.idle{color:var(--ink-light);font-size:16px;font-style:italic;font-weight:400}
.clock-time.break-time{color:#d8903a;font-size:22px}
.clock-btn{padding:8px 18px;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:none;cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap}
.clock-btn.in{background:var(--green);color:#fff}
.clock-btn.in:hover{background:#487228}
.clock-btn.out{background:#fff;color:var(--red);border:1px solid var(--red)}
.clock-btn.out:hover{background:#fcebeb}
.clock-btns{display:flex;flex-direction:column;gap:5px}
.clock-btn-mini{padding:5px 11px;font-size:9.5px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:1px solid;background:#fff;cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap}
.clock-btn-mini.break{border-color:#d8903a;color:#d8903a}
.clock-btn-mini.break:hover{background:#fff7e8}
.clock-btn-mini.resume{border-color:var(--yellow);background:var(--yellow);color:#fff}
.clock-btn-mini.resume:hover{background:var(--yellow-mid);border-color:var(--yellow-mid)}
.clock-btn-mini.out{border-color:var(--red);color:var(--red)}
.clock-btn-mini.out:hover{background:#fcebeb}

/* 扁扁的待交件提醒列 */
.todo-tiny{background:var(--yellow-lightest);border:1px solid var(--yellow-pale);border-radius:3px;padding:6px 10px;margin-bottom:12px;font-size:11px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.todo-tiny-label{font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.18em;color:var(--ink-light);text-transform:uppercase;font-weight:500;white-space:nowrap}
.todo-tiny-item{display:inline-flex;align-items:center;gap:5px;font-size:11px}
.todo-tiny-item .due{font-family:'Noto Sans TC',sans-serif;font-size:11.5px;font-weight:500;color:var(--ink-soft);letter-spacing:0.02em}
.todo-tiny-item.overdue .due{color:#7a1818;font-weight:600}
.todo-tiny-item.urgent .due{color:var(--red);font-weight:600}
.todo-tiny-item.soon .due{color:#d8903a;font-weight:500}
.todo-tiny-item.later .due{color:#b8862a;font-weight:500}
.todo-tiny-item .nam{font-family:'Noto Serif TC',serif;color:var(--ink);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.todo-tiny-item .stage-mini{font-size:9px;color:var(--yellow-mid);background:#fff;padding:1px 4px;border-radius:2px;font-family:Inter,sans-serif;letter-spacing:0.08em;font-weight:500}
.todo-tiny .dot{color:var(--ink-light);font-size:10px}
.todo-tiny .more{color:var(--ink-light);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:11px}

.header{margin:24px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.eyebrow{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.35em;color:var(--yellow-mid);text-transform:uppercase;font-weight:500;margin-bottom:8px}
.title-row{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
.title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:500;letter-spacing:-0.01em}
.title-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--ink-light);font-weight:300;padding-bottom:3px}

.tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--line)}
.tab{flex:1;padding:9px 12px;background:transparent;border:none;color:var(--ink-light);font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;position:relative}
.tab:hover{color:var(--ink-soft)}
.tab.active{color:var(--yellow-mid)}
.tab.active::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--yellow)}

.punch-card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-bottom:14px;position:relative}
.punch-card.disabled{background:#f5f5f0;opacity:0.85}
.punch-card.disabled .fc:disabled,.punch-card.disabled .btn-start:disabled{background:#ebebe6;color:var(--ink-light);cursor:not-allowed;border-color:#e0e0d8}
.punch-warning{background:#fff3e0;border:1px solid #e8b340;border-radius:3px;padding:6px 10px;margin-bottom:10px;font-family:'Noto Sans TC',sans-serif;font-size:11.5px;color:var(--ink-soft);text-align:center;letter-spacing:0.04em}
.punch-head{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-light);font-weight:500;margin-bottom:9px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:9px}
.row3{display:grid;grid-template-columns:1fr 130px 80px;gap:10px;align-items:flex-end}
.flabel{font-family:'Inter',sans-serif;font-size:9.5px;letter-spacing:0.15em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:4px}
.fc{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--line);border-radius:3px;background:#fff;font-family:inherit;color:var(--ink)}
.fc:focus{outline:none;border-color:var(--yellow)}
.btn-start{padding:8px 14px;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:none;background:var(--yellow);color:#fff;cursor:pointer;font-family:'Inter',sans-serif}
.btn-start:hover{background:var(--yellow-mid)}

.active-section{margin-bottom:18px}
.active-card{background:#fff;border-left:3px solid var(--green);border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:0 3px 3px 0;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ac-info{flex:1;min-width:0}
.ac-time{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;margin-bottom:3px;letter-spacing:0.03em}
.ac-proj{font-size:13.5px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Noto Serif TC',serif}
.ac-proj .ac-client{font-size:10.5px;color:var(--ink-light);font-family:Inter,sans-serif;letter-spacing:0.04em;font-weight:400;margin-left:4px}
.ac-meta{font-size:10.5px;color:var(--ink-light);margin-top:2px;font-family:'Cormorant Garamond',serif;font-style:italic}
.ac-meta .stage{display:inline-block;font-family:'Inter',sans-serif;font-style:normal;font-size:9.5px;letter-spacing:0.12em;padding:1px 5px;border-radius:2px;background:var(--yellow-pale);color:var(--yellow-mid);font-weight:500;margin-right:6px;text-transform:uppercase}
.ac-time-start{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--green);letter-spacing:0.04em;line-height:1;margin-bottom:5px;font-variant-numeric:tabular-nums}
.ac-time-start.paused{color:var(--red)}
.ac-time-start .ac-start-label{font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.25em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-left:4px}
.active-card.paused{border-left-color:var(--red);background:#fcecec}
.ac-btns{display:flex;flex-direction:column;gap:5px}
.ac-btn-mini{padding:5px 11px;font-size:9.5px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:1px solid;background:#fff;cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap}
.ac-btn-mini.pause{border-color:#d8903a;color:#d8903a}
.ac-btn-mini.pause:hover{background:var(--yellow-lightest)}
.ac-btn-mini.resume{border-color:var(--yellow);background:var(--yellow);color:#fff}
.ac-btn-mini.resume:hover{background:var(--yellow-mid);border-color:var(--yellow-mid)}
.ac-btn-mini:disabled{background:#e8e8e2!important;color:#a8a8a0!important;border-color:#d0d0c8!important;cursor:not-allowed;opacity:0.7}
.ac-btn-mini.stop{border-color:var(--red);color:var(--red)}
.ac-btn-mini.stop:hover{background:#fcebeb}
.ac-stop{padding:6px 13px;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;font-family:'Inter',sans-serif}
.ac-stop:hover{background:#fcebeb}

.section-head{display:flex;justify-content:space-between;align-items:baseline;margin:18px 0 8px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.section-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:500}
.section-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--ink-light);font-weight:300}
.total{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--yellow-mid)}

.summary{background:var(--yellow-lightest);border:1px solid var(--yellow-soft);border-radius:4px;padding:13px 16px;margin:14px 0 6px;display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.summary-block{text-align:center}
.summary-label{font-family:'Inter',sans-serif;font-size:9.5px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:4px}
.summary-value{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
.summary-value.work{color:var(--yellow-mid)}
.summary-value.rest{color:var(--ink-light);font-style:italic}
.summary-value.span{color:var(--ink-soft)}
.summary-range{font-family:'Cormorant Garamond','Noto Serif TC',serif;font-style:italic;font-size:11px;color:var(--ink-light);margin-top:2px;letter-spacing:0.02em}

.entry{display:grid;grid-template-columns:95px 1fr 55px 70px 22px;gap:10px;padding:9px 4px;border-bottom:1px dashed var(--line);font-size:12.5px;align-items:center;cursor:pointer}
.entry:hover{background:var(--yellow-lightest)}
.entry:last-child{border-bottom:none}
.entry .time{font-family:'Cormorant Garamond',serif;font-size:12.5px;color:var(--ink-soft);letter-spacing:0.02em;font-variant-numeric:tabular-nums}
.entry .proj{font-weight:400;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Noto Serif TC',serif}
.entry .stage{font-size:9.5px;color:var(--yellow-mid);text-align:center;background:var(--yellow-pale);padding:2px 5px;border-radius:2px;font-family:'Inter',sans-serif;letter-spacing:0.1em;font-weight:500;text-transform:uppercase}
.entry .dur{text-align:right;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}
.entry .del{text-align:center;color:var(--ink-light);font-size:14px;line-height:1}
.entry .del:hover{color:var(--red)}
.empty{text-align:center;padding:36px 0;color:var(--ink-light);font-size:12px;font-family:'Cormorant Garamond',serif;font-style:italic}

.report-block{margin-top:16px}
.report-month-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:6px;border-bottom:1px solid var(--line)}
.report-month-label{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--yellow-mid);letter-spacing:0.03em}
.report-month-total{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--ink-soft)}
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.report-table th{padding:7px 6px;text-align:right;font-family:'Inter',sans-serif;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);border-bottom:1px solid var(--line)}
.report-table th:first-child{text-align:left}
.report-table td{padding:7px 6px;text-align:right;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums;border-bottom:1px dashed var(--line)}
.report-table td:first-child{font-family:'Noto Serif TC',serif;color:var(--ink);font-size:12.5px;text-align:left;font-weight:400}
.report-table td.zero{color:var(--ink-light)}
.report-table td.proj-total{color:var(--yellow-mid);font-weight:500}
.report-table td .client{font-size:10.5px;color:var(--ink-light);font-family:Inter,sans-serif;letter-spacing:0.04em;margin-left:4px}
.report-table td.rate{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--yellow-mid);font-style:italic;font-variant-numeric:tabular-nums}
.report-table td.rate .nt{font-size:10px;color:var(--ink-light);margin-right:1px;font-style:normal;letter-spacing:0}
.report-table td.rate .low{color:var(--red);font-style:normal;font-weight:500}
.bar-row2 .nam .client{font-size:10.5px;color:var(--ink-light);font-family:Inter,sans-serif;letter-spacing:0.04em;margin-left:4px}

/* Expand 按鈕 */
.expand-btn{background:transparent;border:1px solid var(--line);color:var(--ink-soft);padding:6px 16px;font-family:'Noto Sans TC',sans-serif;font-size:11.5px;border-radius:3px;cursor:pointer;letter-spacing:0.04em}
.expand-btn:hover{background:var(--yellow-lightest);border-color:var(--yellow);color:var(--yellow-mid)}

/* 日曆 */
.month-nav{display:flex;justify-content:space-between;align-items:center;margin:6px 0 12px}
.month-nav .month-label{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--yellow-mid);letter-spacing:0.04em}
.nav-btn{background:transparent;border:1px solid var(--line);width:28px;height:28px;border-radius:3px;color:var(--ink-soft);cursor:pointer;font-family:Inter,sans-serif;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0}
.nav-btn:hover{background:var(--yellow-lightest);border-color:var(--yellow);color:var(--yellow-mid)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-head{font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);text-align:center;padding:4px 0;font-weight:500}
.cal-day{aspect-ratio:1;border:0.5px solid transparent;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink-light);position:relative}
.cal-day.blank{border:none}
.cal-day.has-data{background:var(--yellow-lightest);color:var(--ink);border-color:var(--yellow-pale);font-weight:500}
.cal-day.has-data .h{font-family:Inter,sans-serif;font-size:8px;letter-spacing:0.04em;color:var(--yellow-mid);font-weight:500;margin-top:1px}
.cal-day.empty-day{color:#c8c8c0}
.cal-day.today{outline:1px solid var(--yellow-mid);outline-offset:-2px}
.cal-day.selected{background:var(--yellow);color:#fff;border-color:var(--yellow-mid)}
.cal-day.selected .h{color:#fff}

/* 日詳細卡片 */
.day-detail{background:#fff;border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-top:10px}
.day-d-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:10px}
.day-d-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:500}
.day-d-tot{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--yellow-mid);font-weight:500}
.day-d-shift{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--ink-light);margin-bottom:10px;padding-bottom:6px;border-bottom:1px dashed var(--line);letter-spacing:0.02em}

/* 今日報表 · 時間軸 */
.tl{display:grid;grid-template-columns:50px 1fr;gap:10px;padding:5px 0;font-size:12px;align-items:flex-start}
.tl .t{font-family:'Cormorant Garamond',serif;color:var(--ink-soft);font-size:12px;font-variant-numeric:tabular-nums;padding-top:6px}
.tl .b{display:flex;justify-content:space-between;align-items:center;background:var(--yellow-lightest);border-left:2px solid var(--yellow);padding:6px 10px;border-radius:0 3px 3px 0;gap:8px}
.tl .b.rest{background:transparent;border-left:2px dashed var(--line)}
.tl .b .nam{font-family:'Noto Serif TC',serif;font-weight:500;font-size:12.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0;overflow:hidden}
.tl .b .nam .cli{font-size:10px;color:var(--ink-light);font-family:Inter,sans-serif;font-weight:400;letter-spacing:0.04em}
.tl .b .nam .stg{font-size:9.5px;color:var(--yellow-mid);background:#fff;padding:1px 5px;border-radius:2px;font-family:Inter,sans-serif;letter-spacing:0.1em;font-weight:500;text-transform:uppercase}
.tl .b .dur{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--ink-soft);white-space:nowrap}
.tl .b.rest .dur{font-style:italic;color:var(--ink-light)}
.tl .b.rest .nam{font-style:italic;color:var(--ink-light);font-weight:400}

/* 今日報表 · 按案拆 */
.proj-block{margin-bottom:14px}
.proj-block:last-child{margin-bottom:0}
.pb-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:5px;border-bottom:0.5px solid var(--line);margin-bottom:5px}
.pb-name{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:500}
.pb-client{font-size:10.5px;color:var(--ink-light);font-family:Inter,sans-serif;letter-spacing:0.04em;margin-left:4px;font-weight:400}
.pb-tot{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:500;color:var(--yellow-mid)}
.pb-stage{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;gap:8px}
.pb-stage .s{font-family:Inter,sans-serif;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--yellow-mid);background:var(--yellow-pale);padding:2px 6px;border-radius:2px;font-weight:500;white-space:nowrap}
.pb-stage .d{font-family:'Cormorant Garamond',serif;font-size:12.5px;color:var(--ink-soft);white-space:nowrap}
.pb-stage .note{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--ink-light);flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.report-table tfoot td{background:var(--yellow-lightest);font-weight:500;color:var(--ink);border-top:1px solid var(--line);border-bottom:none}
.report-table tfoot td:first-child{color:var(--ink-soft);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;font-weight:500}

.bar-row2{display:grid;grid-template-columns:110px 1fr 70px;gap:10px;padding:5px 0;font-size:12.5px;align-items:center}
.bar-row2 .nam{font-family:'Noto Serif TC',serif;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row2 .bar-wrap{height:6px;background:#f0ece0;border-radius:3px;overflow:hidden}
.bar-row2 .bar{height:100%;border-radius:3px}
.bar-row2 .dur{text-align:right;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums}

.import-note{background:var(--yellow-lightest);border-left:3px solid var(--yellow);padding:11px 16px;margin-top:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.import-note-text{font-family:'Noto Serif TC',serif;font-size:12px;color:var(--ink);letter-spacing:0.06em}
.import-note-text .italic{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft)}
.import-btn{padding:5px 12px;font-size:10px;font-weight:500;border:1px solid var(--yellow);background:#fff;color:var(--yellow-mid);border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.18em;text-transform:uppercase}

.modal-overlay{position:fixed;inset:0;background:rgba(40,35,25,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--paper);border-radius:4px;width:100%;max-width:440px;padding:26px 30px;border:1px solid var(--line);max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.15)}
.modal-title{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:500;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.modal .field{margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
.btn-sub{padding:7px 16px;font-size:10px;font-weight:500;border-radius:3px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.2em;text-transform:uppercase}
.btn-sub.primary{background:var(--yellow);color:#fff;border-color:var(--yellow)}
.btn-sub.danger{background:#fff;color:var(--red);border-color:var(--red)}
.btn-sub.reopen{background:#fff;color:var(--green);border-color:var(--green)}
.btn-sub.reopen:hover{background:#f0f7ea}

@media (max-width:520px){
  .a4{padding:24px 22px 24px}
  .corner-l,.corner-r{font-size:9px}
  .title{font-size:20px}
  .row3{grid-template-columns:1fr;gap:8px}
  .summary{grid-template-columns:1fr;gap:10px}
}
</style>
</head>
<body>
<div class="viewport"><article class="a4" id="app"></article></div>

<script>
var API="/api/notion",USE_API=true;
var ENTRIES_KEY='timeTrackerEntries_v2',ACTIVE_KEY='timeTrackerActive_v2',PROJECTS_KEY='timeTrackerProjects_v2',SHIFT_KEY='timeTrackerShift_v2',SHIFTS_KEY='timeTrackerShifts_v2';
function ls_get(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function ls_set(k,v){localStorage.setItem(k,JSON.stringify(v));}
function uid(){return 'e'+Date.now()+Math.random().toString(36).slice(2,7);}
function pad(n){return String(n).padStart(2,'0');}
function fmtTime(ts){var d=new Date(ts);return pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtDur(ms){if(ms<=0)return '0m';var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h===0)return m+'m';return h+'h'+(m>0?' '+m+'m':'');}
function fmtClock(ms){var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return pad(h)+':'+pad(m)+':'+pad(ss);}
function fmtDateEN(ts){var d=new Date(ts);var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}
function dayOfWeekEN(){var w=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];return w[new Date().getDay()];}
function todayKey(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function dateKey(ts){var d=new Date(ts);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function nowHM(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
function tsFromHM(hm){var d=new Date(),p=hm.split(':');d.setHours(parseInt(p[0])||0,parseInt(p[1])||0,0,0);return d.getTime();}
function fmtDurShort(ms){if(ms<=0)return '';var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h===0)return m+'m';if(m===0)return h+'h';return h+'h';}
// 取得實工毫秒:優先用存好的 durMin(已扣暫停),沒有才現算
function entryDur(e){
  if(typeof e.durMin==='number'&&e.durMin>0)return e.durMin*60000;
  return Math.max(0,(e.endAt||0)-(e.startAt||0)-(e.pauseTotal||0));
}
function prevMonth(){var p=state.dailyMonth.split('-');var d=new Date(parseInt(p[0]),parseInt(p[1])-2,1);state.dailyMonth=d.getFullYear()+'-'+pad(d.getMonth()+1);state.dailySelectedDay=null;render();}
function nextMonth(){var p=state.dailyMonth.split('-');var d=new Date(parseInt(p[0]),parseInt(p[1]),1);state.dailyMonth=d.getFullYear()+'-'+pad(d.getMonth()+1);state.dailySelectedDay=null;render();}
function stageLabel(s){return s||'其他';}
function isOtherWork(e){return e&&e.projectId==='__other__';}

function apiListProjects(cb){fetch(API,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
  var arr=null;
  if(Array.isArray(d))arr=d;
  else if(d&&Array.isArray(d.projects))arr=d.projects;
  if(arr){
    var WAIT=['等待素材','待確認','暫緩'];
    var ps=arr.filter(function(p){
      if(p.closed)return false;
      if(p.status==='Final完成')return false;
      if(p.finalDone)return false;
      if(WAIT.indexOf(p.status)>=0)return false;
      return true;
    }).map(function(p){return {
      id:p.id,notionId:p.notionId,client:p.client,name:p.name,type:p.type||'',
      cut1Due:p.cut1Due||'',cut1Done:!!p.cut1Done,noCut1:!!p.noCut1,
      v1Due:p.v1Due||'',v1Done:!!p.v1Done,
      bizDue:p.bizDue||'',bizDone:!!p.bizDone,noBiz:!!p.noBiz,
      finalDue:p.finalDue||'',finalDone:!!p.finalDone,
      fee:Number(p.fee)||0,
      finalLen:p.finalLen||p.length||''
    };});
    cb(null,ps);
  }
  else cb((d&&d.error)||'API error');
}).catch(function(e){cb(e.message||'Network error');});}
function apiListEntries(cb){fetch(API+'?action=time-list',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
  var arr=null;
  if(Array.isArray(d))arr=d;
  else if(d&&Array.isArray(d.entries))arr=d.entries;
  if(arr)cb(null,arr);else cb((d&&d.error)||'API error');
}).catch(function(e){cb(e.message||'Network error');});}
function apiSaveEntry(entry,cb){fetch(API+'?action=time-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry),cache:'no-store'}).then(function(r){return r.json();}).then(function(d){if(d.ok)cb(null,d.notionId);else cb(d.error||'Save error');}).catch(function(e){cb(e.message||'Network error');});}
function apiDeleteEntry(notionId,cb){fetch(API+'?action=time-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notionId:notionId}),cache:'no-store'}).then(function(r){return r.json();}).then(function(d){cb(d.ok?null:(d.error||'Delete error'));}).catch(function(e){cb(e.message||'Network error');});}

var state={
  view:'today',
  gearMenu:false,
  newProjId:'', // 新增打卡選的專案(空 / id / __other__)
  newOtherName:'', // 其他工作的自由命名
  dailyMonth:todayKey().slice(0,7), // 'YYYY-MM' 日誌頁當前查看月份
  dailySelectedDay:null, // 'YYYY-MM-DD' 日誌頁選中的某天
  reportShowAll:false, // Report 是否展開全部月份
  shift:ls_get(SHIFT_KEY)||null, // {startAt, workDay: 'YYYY-MM-DD', breakAt:?, breakTotal:0}
  shifts:ls_get(SHIFTS_KEY)||[], // 歷史 shift 紀錄 [{workDay, startAt, endAt}]
  active:ls_get(ACTIVE_KEY)||[],
  entries:ls_get(ENTRIES_KEY)||[],
  projects:ls_get(PROJECTS_KEY)||[],
  modal:null,modalForm:{},loading:false,loadError:null
};

// 每分鐘重繪一次上班時長
setInterval(function(){if(state.shift)render();},60000);

// (進行中卡片改成靜態顯示「14:30 開始」,不需要每秒重繪)

function openShiftBackfill(){
  var d=new Date(),y=todayKey();
  state.modalForm={workDay:y,startTime:'10:00',endTime:'18:00'};
  state.modal='shift';
  render();
}
function saveShiftBackfill(){
  var f=state.modalForm;
  if(!f.workDay||!f.startTime||!f.endTime){alert('請填完整');return;}
  var startAt=new Date(f.workDay+'T'+f.startTime+':00').getTime();
  var endAt=new Date(f.workDay+'T'+f.endTime+':00').getTime();
  // 跨日:下班 < 上班 → 加一天
  if(endAt<=startAt)endAt+=24*3600000;
  state.shifts.push({workDay:f.workDay,startAt:startAt,endAt:endAt,backfilled:true});
  ls_set(SHIFTS_KEY,state.shifts);
  closeModal();
}

function editClockIn(){
  if(!state.shift)return;
  var current=fmtTime(state.shift.startAt);
  var newHM=prompt('修改上班時間(格式 HH:MM)\n\n例:你 10:00 起床就工作,但忘了按上班,12:00 才想起來按 — 現在改成 10:00 即可',current);
  if(!newHM||newHM===current)return;
  if(!/^\d{1,2}:\d{2}$/.test(newHM)){alert('格式不對,例:10:30');return;}
  var parts=newHM.split(':');
  var d=new Date(state.shift.startAt);
  d.setHours(parseInt(parts[0])||0,parseInt(parts[1])||0,0,0);
  state.shift.startAt=d.getTime();
  ls_set(SHIFT_KEY,state.shift);
  render();
}

function editActiveStart(id){
  var item=state.active.find(function(x){return x.id===id;});
  if(!item)return;
  var current=fmtTime(item.startAt);
  var newHM=prompt('修改開始時間(格式 HH:MM)',current);
  if(!newHM||newHM===current)return;
  if(!/^\d{1,2}:\d{2}$/.test(newHM)){alert('格式不對,例:14:30');return;}
  var parts=newHM.split(':');
  var d=new Date(item.startAt);
  d.setHours(parseInt(parts[0])||0,parseInt(parts[1])||0,0,0);
  item.startAt=d.getTime();
  ls_set(ACTIVE_KEY,state.active);
  render();
}

function reopenLastShift(){
  if(state.shift){alert('現在還在上班中');return;}
  if(!state.shifts||state.shifts.length===0){alert('沒有歷史下班紀錄');return;}
  // 找最後一筆 shift (sorted by endAt desc)
  var sorted=state.shifts.slice().sort(function(a,b){return b.endAt-a.endAt;});
  var lastShift=sorted[0];
  var hoursPassed=Math.round((Date.now()-lastShift.endAt)/60000);
  if(!confirm('復原最後一次下班?\n\n'+lastShift.workDay+' '+fmtTime(lastShift.startAt)+' → '+fmtTime(lastShift.endAt)+'\n\n下班到現在 '+hoursPassed+' 分鐘會自動算成休息(不計工時)。'))return;
  // 把 lastShift 拉回 active shift,中間時間加進 breakTotal
  var extraBreak=Date.now()-lastShift.endAt;
  state.shift={
    startAt:lastShift.startAt,
    workDay:lastShift.workDay,
    breakTotal:(lastShift.breakTotal||0)+extraBreak,
    breakAt:null
  };
  // 從歷史移除
  state.shifts=state.shifts.filter(function(s){return !(s.startAt===lastShift.startAt&&s.endAt===lastShift.endAt);});
  ls_set(SHIFT_KEY,state.shift);
  ls_set(SHIFTS_KEY,state.shifts);
  render();
}

function clockIn(){
  if(state.shift){alert('已經在上班中了');return;}
  var defaultHM=nowHM();
  var newHM=prompt('上班時間\n\n要從幾點開始算?(預設現在)\n格式 HH:MM,例:10:00',defaultHM);
  if(!newHM)return;
  if(!/^\d{1,2}:\d{2}$/.test(newHM)){alert('格式不對,例:10:30');return;}
  var parts=newHM.split(':');
  var d=new Date();
  d.setHours(parseInt(parts[0])||0,parseInt(parts[1])||0,0,0);
  // 若選的時間在未來,當作今天現在
  if(d.getTime()>Date.now())d=new Date();
  state.shift={startAt:d.getTime(),workDay:todayKey()};
  ls_set(SHIFT_KEY,state.shift);
  render();
}
function startBreak(){
  if(!state.shift||state.shift.breakAt)return;
  state.shift.breakAt=Date.now();
  // 整批暫停 active 工作,但記住哪些是「休息前已暫停」的(不要事後恢復)
  state.active.forEach(function(item){
    if(item.pausedAt){
      item.wasManuallyPaused=true; // 本來就在暫停
    } else {
      item.wasManuallyPaused=false;
      item.pausedAt=Date.now();
    }
  });
  ls_set(SHIFT_KEY,state.shift);
  ls_set(ACTIVE_KEY,state.active);
  render();
}
function endBreak(){
  if(!state.shift||!state.shift.breakAt)return;
  var dur=Date.now()-state.shift.breakAt;
  state.shift.breakTotal=(state.shift.breakTotal||0)+dur;
  state.shift.breakAt=null;
  // 只恢復「休息時被自動暫停」的,保留「本來就手動暫停」的
  state.active.forEach(function(item){
    if(item.pausedAt&&!item.wasManuallyPaused){
      item.pauseTotal=(item.pauseTotal||0)+(Date.now()-item.pausedAt);
      item.pausedAt=null;
    }
    delete item.wasManuallyPaused;
  });
  ls_set(SHIFT_KEY,state.shift);
  ls_set(ACTIVE_KEY,state.active);
  render();
}

function clockOut(){
  if(!state.shift){return;}
  if(state.active.length>0){
    if(!confirm('還有 '+state.active.length+' 個進行中的打卡,要全部結束並下班嗎?'))return;
    state.active.slice().forEach(function(item){stopPunch(item.id);});
  }
  // 若還在休息中,結算掉
  var breakTotal=state.shift.breakTotal||0;
  if(state.shift.breakAt)breakTotal+=(Date.now()-state.shift.breakAt);
  // 存進歷史 shifts
  state.shifts.push({workDay:state.shift.workDay,startAt:state.shift.startAt,endAt:Date.now(),breakTotal:breakTotal});
  ls_set(SHIFTS_KEY,state.shifts);
  state.shift=null;
  ls_set(SHIFT_KEY,null);
  render();
}

function startPunch(){
  if(!state.shift){alert('請先按「上班」再開始打卡');return;}
  var projSel=document.getElementById('proj-select');
  var noteInput=document.getElementById('note-input');
  var startInput=document.getElementById('start-input');
  if(!projSel||!projSel.value){alert('請選專案');return;}
  var isOther=projSel.value==='__other__';
  var label,stage,client;
  if(isOther){
    var otherName=(state.newOtherName||'').trim();
    if(!otherName){alert('請輸入你在做什麼');return;}
    label=otherName;
    stage='其他工作';
    client='';
  } else {
    var proj=state.projects.find(function(p){return p.id===projSel.value;});
    label=proj?proj.name:projSel.options[projSel.selectedIndex].text;
    var stageSel=document.getElementById('stage-select');
    stage=stageSel?(stageSel.value||'其他'):'其他';
    client=proj?proj.client:'';
  }
  state.active.push({
    id:uid(),projectId:projSel.value,
    projectLabel:label,
    client:client,
    stage:stage,note:noteInput?(noteInput.value||''):'',
    startAt:tsFromHM(startInput.value||nowHM()),
    workDay:state.shift.workDay
  });
  ls_set(ACTIVE_KEY,state.active);
  // 重置
  state.newProjId='';state.newOtherName='';
  render();
}

function pausePunch(id){
  var item=state.active.find(function(x){return x.id===id;});
  if(!item||item.pausedAt)return;
  item.pausedAt=Date.now();
  ls_set(ACTIVE_KEY,state.active);render();
}
function resumePunch(id){
  if(state.shift&&state.shift.breakAt){alert('休息中,請先按「▸ 回來」');return;}
  var item=state.active.find(function(x){return x.id===id;});
  if(!item||!item.pausedAt)return;
  item.pauseTotal=(item.pauseTotal||0)+(Date.now()-item.pausedAt);
  item.pausedAt=null;
  ls_set(ACTIVE_KEY,state.active);render();
}
function stopPunch(id){
  var item=state.active.find(function(x){return x.id===id;});
  if(!item)return;
  var endAt=Date.now();
  // 若還在暫停中,先把暫停時段結算掉
  var pauseTotal=item.pauseTotal||0;
  if(item.pausedAt)pauseTotal+=(endAt-item.pausedAt);
  // 工作毫秒數 = 結束 - 開始 - 暫停總和(A 方案:加總,扣除暫停)
  var workMs=Math.max(0,endAt-item.startAt-pauseTotal);
  var entry={
    id:item.id,projectId:item.projectId,projectLabel:item.projectLabel,
    client:item.client,stage:item.stage,note:item.note,
    startAt:item.startAt,endAt:endAt,
    durMin:Math.round(workMs/60000),
    pauseTotal:pauseTotal,
    workDay:item.workDay||dateKey(item.startAt)
  };
  state.entries.unshift(entry);
  state.active=state.active.filter(function(x){return x.id!==id;});
  ls_set(ENTRIES_KEY,state.entries);ls_set(ACTIVE_KEY,state.active);
  render();
  if(USE_API)apiSaveEntry(entry,function(err,notionId){if(err){console.warn('儲存失敗',err);return;}if(notionId){entry.notionId=notionId;state.entries=state.entries.map(function(e){return e.id===entry.id?entry:e;});ls_set(ENTRIES_KEY,state.entries);}});
}

function deleteEntry(id){
  if(!confirm('確定刪除這筆紀錄?'))return;
  var ent=state.entries.find(function(e){return e.id===id;});
  state.entries=state.entries.filter(function(e){return e.id!==id;});
  ls_set(ENTRIES_KEY,state.entries);render();
  if(USE_API&&ent&&ent.notionId)apiDeleteEntry(ent.notionId,function(err){if(err)console.warn('刪除失敗',err);});
}

function reopenEntry(id){
  var e=state.entries.find(function(x){return x.id===id;});
  if(!e)return;
  if(!confirm('把這筆紀錄拉回「進行中」?\n\n結束→復原中間這段會自動算成暫停(不計工時)。'))return;
  // 計算「從結束到現在」這段要算進 pauseTotal(等於額外暫停)
  var extraPause=Date.now()-e.endAt;
  var newPauseTotal=(e.pauseTotal||0)+extraPause;
  // 拉回 active
  state.active.push({
    id:e.id,projectId:e.projectId,projectLabel:e.projectLabel,
    client:e.client||'',stage:e.stage,note:e.note||'',
    startAt:e.startAt,
    pauseTotal:newPauseTotal,
    pausedAt:null,
    workDay:e.workDay||dateKey(e.startAt),
    notionId:e.notionId
  });
  // 從 entries 移除
  state.entries=state.entries.filter(function(x){return x.id!==e.id;});
  ls_set(ACTIVE_KEY,state.active);
  ls_set(ENTRIES_KEY,state.entries);
  closeModal();
  // 若有 notionId,把 Notion 那筆 archive(待重新存)
  if(USE_API&&e.notionId){
    apiDeleteEntry(e.notionId,function(err){if(err)console.warn('Notion archive 失敗',err);});
  }
}

function openEdit(id){var e=state.entries.find(function(x){return x.id===id;});if(!e)return;state.modalForm={id:e.id,notionId:e.notionId,projectId:e.projectId,projectLabel:e.projectLabel,client:e.client||'',stage:e.stage,note:e.note||'',startDate:dateKey(e.startAt),startTime:fmtTime(e.startAt),endDate:dateKey(e.endAt),endTime:fmtTime(e.endAt),workDay:e.workDay||dateKey(e.startAt)};state.modal='edit';render();}
function openManual(){var now=new Date(),start=new Date(now.getTime()-3600000);state.modalForm={projectId:'',projectLabel:'',client:'',stage:'初剪',note:'',startDate:dateKey(start),startTime:fmtTime(start),endDate:dateKey(now),endTime:fmtTime(now),workDay:dateKey(start)};state.modal='manual';render();}
function closeModal(){state.modal=null;render();}

function saveModal(){
  var f=state.modalForm;
  if(!f.projectLabel){alert('請選專案');return;}
  var startAt=new Date(f.startDate+'T'+f.startTime+':00').getTime();
  var endAt=new Date(f.endDate+'T'+f.endTime+':00').getTime();
  if(endAt<=startAt){alert('結束時間要在開始之後');return;}
  var workDay=f.workDay||dateKey(startAt);
  var entry;
  var rangeMin=Math.round((endAt-startAt)/60000);
  var finalDur=(typeof f.overrideDurMin==='number')?f.overrideDurMin:rangeMin;
  // pauseTotal = 範圍時長 - 實工時(若小於 0 設 0)
  var newPauseTotal=Math.max(0,(rangeMin-finalDur)*60000);
  if(f.id){state.entries=state.entries.map(function(e){if(e.id===f.id){entry=Object.assign({},e,{projectId:f.projectId,projectLabel:f.projectLabel,client:f.client,stage:f.stage,note:f.note,startAt:startAt,endAt:endAt,durMin:finalDur,pauseTotal:newPauseTotal,workDay:workDay});return entry;}return e;});}
  else{entry={id:uid(),projectId:f.projectId,projectLabel:f.projectLabel,client:f.client,stage:f.stage,note:f.note,startAt:startAt,endAt:endAt,durMin:finalDur,pauseTotal:newPauseTotal,workDay:workDay};state.entries.unshift(entry);}
  state.entries.sort(function(a,b){return b.startAt-a.startAt;});
  ls_set(ENTRIES_KEY,state.entries);closeModal();
  if(USE_API&&entry)apiSaveEntry(entry,function(err,notionId){if(err){console.warn('儲存失敗',err);return;}if(notionId){entry.notionId=notionId;state.entries=state.entries.map(function(e){return e.id===entry.id?entry:e;});ls_set(ENTRIES_KEY,state.entries);render();}});
}

function deleteFromModal(){if(!state.modalForm.id||!confirm('確定刪除?'))return;var ent=state.entries.find(function(e){return e.id===state.modalForm.id;});state.entries=state.entries.filter(function(e){return e.id!==state.modalForm.id;});ls_set(ENTRIES_KEY,state.entries);closeModal();if(USE_API&&ent&&ent.notionId)apiDeleteEntry(ent.notionId,function(err){if(err)console.warn('刪除失敗',err);});}

function refreshProjects(){state.loading=true;state.loadError=null;render();apiListProjects(function(err,ps){state.loading=false;if(err)state.loadError=err;else{state.projects=ps;ls_set(PROJECTS_KEY,ps);}render();});}
function syncFromCloud(){apiListEntries(function(err,entries){
  if(err){console.warn('雲端讀取失敗',err);return;}
  // 保留本地 pauseTotal、workDay(雲端如果是 0 或空,用本地的)
  var localById={};
  state.entries.forEach(function(e){if(e.id)localById[e.id]=e;});
  entries.forEach(function(e){
    var local=localById[e.id];
    if(local){
      if((!e.pauseTotal||e.pauseTotal===0)&&local.pauseTotal)e.pauseTotal=local.pauseTotal;
      if(!e.workDay&&local.workDay)e.workDay=local.workDay;
    }
  });
  state.entries=entries;
  ls_set(ENTRIES_KEY,entries);
  render();
});}

// ── 匯出/匯入 ──
function downloadFile(filename,content,type){
  var blob=new Blob([content],{type:type});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function exportJSON(){
  var data={
    version:1,
    exportedAt:new Date().toISOString(),
    entries:state.entries,
    projects:state.projects
  };
  var today=todayKey();
  downloadFile('time-tracker-backup-'+today+'.json',JSON.stringify(data,null,2),'application/json');
}

function exportCSV(){
  // 兩段:打卡紀錄 + 結算表
  var lines=[];
  // 第一段:打卡紀錄
  lines.push('# 打卡紀錄 · Entries');
  lines.push('日期,開始,結束,客戶,專案,階段,備註,時長(分)');
  state.entries.slice().sort(function(a,b){return b.startAt-a.startAt;}).forEach(function(e){
    var dur=Math.round((e.endAt-e.startAt)/60000);
    var row=[
      dateKey(e.startAt),
      fmtTime(e.startAt),
      fmtTime(e.endAt),
      csvEsc(e.client||''),
      csvEsc(e.projectLabel||''),
      csvEsc(e.stage||''),
      csvEsc(e.note||''),
      dur
    ];
    lines.push(row.join(','));
  });
  lines.push('');
  // 第二段:結算表(按月份 × 階段)
  lines.push('# 結算表 · Monthly Report');
  var STAGES=['前置','初剪','ES','業配','輸出','其他'];
  lines.push('月份,專案,'+STAGES.join(',')+',合計');
  var monthMap={};
  state.entries.forEach(function(e){
    var ym=dateKey(e.startAt).slice(0,7);
    if(!monthMap[ym])monthMap[ym]={};
    var key=e.projectLabel||'(無)';
    if(!monthMap[ym][key])monthMap[ym][key]={stages:{},total:0};
    var dur=entryDur(e),st=e.stage||'其他';
    monthMap[ym][key].stages[st]=(monthMap[ym][key].stages[st]||0)+dur;
    monthMap[ym][key].total+=dur;
  });
  Object.keys(monthMap).sort().reverse().forEach(function(ym){
    Object.entries(monthMap[ym]).sort(function(a,b){return b[1].total-a[1].total;}).forEach(function(p){
      var row=[ym,csvEsc(p[0])];
      STAGES.forEach(function(s){
        var ms=p[1].stages[s]||0;
        row.push(ms>0?Math.round(ms/60000):0);
      });
      row.push(Math.round(p[1].total/60000));
      lines.push(row.join(','));
    });
  });
  var bom='\uFEFF'; // UTF-8 BOM,讓 Excel 開不亂碼
  var today=todayKey();
  downloadFile('time-tracker-'+today+'.csv',bom+lines.join('\n'),'text/csv;charset=utf-8');
}

function csvEsc(s){s=String(s||'');if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)return '"'+s.replace(/"/g,'""')+'"';return s;}

function importJSON(input){
  if(!input.files[0])return;
  if(!confirm('匯入會覆蓋目前的打卡紀錄,確定?'))return;
  var file=input.files[0];
  var r=new FileReader();
  r.onload=function(){
    try{
      var data=JSON.parse(r.result);
      var entries=data.entries||(Array.isArray(data)?data:[]);
      if(!Array.isArray(entries)){alert('檔案格式不對');return;}
      state.entries=entries;
      ls_set(ENTRIES_KEY,entries);
      render();
      alert('已匯入 '+entries.length+' 筆紀錄(注意:這只還原本機,沒同步到 Notion)');
    }catch(e){alert('讀取失敗:'+e.message);}
  };
  r.readAsText(file);
}

        html+='    <div class="clock-time">'+fmtDur(Math.max(0,shiftMs3))+'</div>';

      html+='  </div>';

        html+='    <button class="clock-btn-mini resume" onclick="endBreak()">▸ 回來</button>';
      } else {
        html+='    <button class="clock-btn-mini break" onclick="startBreak()">‖ 休息</button>';
      }
      html+='    <button class="clock-btn-mini out" onclick="clockOut()">■ 下班</button>';
      html+='  </div>';
      html+='</div>';
    } else {
      // 看有沒有最近 2 小時內的下班 (顯示復原按鈕)
      var recentShift=null;
      if(state.shifts&&state.shifts.length>0){
        var sortedShifts=state.shifts.slice().sort(function(a,b){return b.endAt-a.endAt;});
        if(Date.now()-sortedShifts[0].endAt<2*3600000)recentShift=sortedShifts[0];
      }
      html+='<div class="clock-bar">';
      html+='  <div class="clock-info">';
      if(recentShift){

        html+='    <div class="clock-time idle"><a onclick="reopenLastShift()" style="cursor:pointer;color:var(--yellow-mid);text-decoration:underline;text-decoration-style:dotted;font-style:normal;font-size:13px">↩ 我還沒下班(復原)</a></div>';
      } else {
        html+='    <div class="clock-status">尚未上班</div>';
        html+='    <div class="clock-time idle">準備好就開工</div>';
      }
      html+='  </div>';
      html+='  <button class="clock-btn in" onclick="clockIn()">▸ 上班</button>';
      html+='</div>';
    }

    // 待交件提醒列(扁扁的金黃條)
    var todos=[];
    var todayD=new Date();todayD.setHours(0,0,0,0);
    state.projects.forEach(function(p){
      var stages=[
        {key:'cut1',done:p.cut1Done,due:p.cut1Due,skip:p.noCut1,label:'初剪'},
        {key:'v1',done:p.v1Done,due:p.v1Due,skip:false,label:'ES'},
        {key:'biz',done:p.bizDone,due:p.bizDue,skip:p.noBiz,label:'業配'},
        {key:'final',done:p.finalDone,due:p.finalDue,skip:false,label:'Final'}
      ];
      stages.forEach(function(s){
        if(s.skip||s.done||!s.due)return;
        var d=new Date(s.due);d.setHours(0,0,0,0);
        var days=Math.round((d-todayD)/86400000);
        if(days<-7)return; // 7天以前的不顯示
        todos.push({name:p.name,client:p.client,stage:s.label,due:s.due,days:days});
      });
    });
    todos.sort(function(a,b){return a.days-b.days;});
    if(todos.length>0){
      html+='<div class="todo-tiny">';
      html+='  <span class="todo-tiny-label">📌 待交</span>';
      var showCount=Math.min(todos.length,3);
      for(var i=0;i<showCount;i++){
        var t=todos[i];
        var cls=t.days<0?'overdue':(t.days<=1?'urgent':(t.days<=5?'soon':'later'));
        var lbl=t.days<0?Math.abs(t.days)+'天前':(t.days===0?'今天':(t.days===1?'明天':t.days+'天'));
        if(i>0)html+='<span class="dot">·</span>';
        html+='  <span class="todo-tiny-item '+cls+'"><span class="due">'+lbl+'</span><span class="nam">'+t.name+'</span><span class="stage-mini">'+t.stage+'</span></span>';
      }
      if(todos.length>showCount)html+='<span class="more">+'+(todos.length-showCount)+'</span>';
      html+='</div>';
    }
    var disabled=!state.shift||!!(state.shift&&state.shift.breakAt);
    html+='<div class="punch-card'+(disabled?' disabled':'')+'">';
    if(disabled){
      html+='  <div class="punch-warning">⚠ '+(state.shift&&state.shift.breakAt?'休息中,點「▸ 回來」才能繼續':'請先按上班才能新增工作')+'</div>';
    }
    html+='  <div class="punch-head">+ 新增工作 · Add Work</div>';
    html+='  <div class="row">';
    html+='    <div><div class="flabel">Project / 專案</div>';
    html+='      <select id="proj-select" class="fc" '+(disabled?'disabled':'')+' onchange="state.newProjId=this.value;render();">';
    html+='        <option value="">— 請選 —</option>';
    state.projects.forEach(function(p){html+='        <option value="'+p.id+'" '+(state.newProjId===p.id?'selected':'')+'>【'+p.client+'】'+p.name+'</option>';});
    html+='        <option value="__other__" '+(state.newProjId==='__other__'?'selected':'')+'>+ 其他工作</option>';
    html+='      </select></div>';
    if(state.newProjId==='__other__'){
      html+='    <div><div class="flabel">在做什麼? / Doing what?</div>';
      html+='      <input id="other-name-input" class="fc" '+(disabled?'disabled':'')+' placeholder="例:寫工作追蹤器" value="'+(state.newOtherName||'')+'" oninput="state.newOtherName=this.value">';
      html+='    </div>';
    } else {
      html+='    <div><div class="flabel">Stage / 階段</div>';
      html+='      <select id="stage-select" class="fc" '+(disabled?'disabled':'')+'>';
      ['前置','初剪','ES','業配','輸出','其他'].forEach(function(s){html+='        <option value="'+s+'">'+s+'</option>';});
      html+='      </select></div>';
    }
    html+='  </div>';
    html+='  <div class="row3">';
    html+='    <div><div class="flabel">Note / 備註</div><input id="note-input" class="fc" '+(disabled?'disabled':'')+' placeholder="修頭尾"></div>';
    html+='    <div><div class="flabel">Start / 開始</div><input id="start-input" type="time" class="fc" '+(disabled?'disabled':'')+' value="'+nowHM()+'"></div>';
    html+='    <button class="btn-start" '+(disabled?'disabled':'')+' onclick="startPunch()">▸ Start</button>';
    html+='  </div>';
    html+='</div>';

    if(state.active.length>0){
      html+='<div class="active-section">';
      html+='  <div class="section-head"><div class="section-title">進行中 · <span class="section-en">Active ('+state.active.length+')</span></div></div>';
      state.active.forEach(function(item){
        var isPaused=!!item.pausedAt;
        html+='  <div class="active-card '+(isPaused?'paused':'')+'">';
        html+='    <div class="ac-info">';
        html+='      <div class="ac-time-start '+(isPaused?'paused':'')+'" onclick="editActiveStart(\''+item.id+'\')" style="cursor:pointer" title="點擊修改開始時間">'+fmtTime(item.startAt)+' <span class="ac-start-label">開始 · '+(isPaused?'暫停中':'進行中')+'</span></div>';
        html+='      <div class="ac-proj">'+(item.projectLabel||'(無)')+(item.client?'<span class="ac-client">·'+item.client+'</span>':'')+'</div>';
        html+='      <div class="ac-meta"><span class="stage">'+stageLabel(item.stage)+'</span>'+(item.note||'')+'</div>';
        html+='    </div>';
        html+='    <div class="ac-btns">';
        var onBreak=!!(state.shift&&state.shift.breakAt);
        if(isPaused){
          html+='      <button class="ac-btn-mini resume" '+(onBreak?'disabled title="休息中,先按 ▸ 回來"':'')+' onclick="resumePunch(\''+item.id+'\')">▸ 繼續</button>';
        } else {
          html+='      <button class="ac-btn-mini pause" onclick="pausePunch(\''+item.id+'\')">‖ 暫停</button>';
        }
        html+='      <button class="ac-btn-mini stop" onclick="stopPunch(\''+item.id+'\')">■ 結束</button>';
        html+='    </div>';
        html+='  </div>';
      });
      html+='</div>';
    }

    var today=todayKey();
    // 「今天」= 上班中當前 workDay,或 today date(沒上班時用日曆日)
    var todayKey2=state.shift?state.shift.workDay:todayKey();
    var todayEntries=state.entries.filter(function(e){return (e.workDay||dateKey(e.startAt))===todayKey2;});
    todayEntries.sort(function(a,b){return a.startAt-b.startAt;});
    var workMs=todayEntries.reduce(function(s,e){return s+(entryDur(e));},0);
    var spanMs=0,restMs=0,spanLabel='—';
    var todayActive=state.active.filter(function(a){return (a.workDay||dateKey(a.startAt))===todayKey2;});
    var todayShifts=state.shifts.filter(function(s){return s.workDay===todayKey2;});
    if(todayEntries.length>0||todayActive.length>0||todayShifts.length>0||state.shift){
      // firstStart 取上班 / 第一筆 entry / active / 補的 shift 最早
      var candidates=[];
      if(state.shift)candidates.push(state.shift.startAt);
      todayShifts.forEach(function(s){candidates.push(s.startAt);});
      todayEntries.forEach(function(e){candidates.push(e.startAt);});
      todayActive.forEach(function(a){candidates.push(a.startAt);});
      if(candidates.length===0)candidates.push(Date.now());
      var firstStart=Math.min.apply(null,candidates);
      var ends=[];
      todayEntries.forEach(function(e){ends.push(e.endAt);});
      todayShifts.forEach(function(s){ends.push(s.endAt);});
      var lastEnd=ends.length>0?Math.max.apply(null,ends):firstStart;
      if(todayActive.length>0||state.shift)lastEnd=Date.now();
      spanMs=lastEnd-firstStart;
      restMs=Math.max(0,spanMs-workMs);
      spanLabel=fmtTime(firstStart)+' → '+(todayActive.length>0||state.shift?'現在':fmtTime(lastEnd));
    }
    // 黃色 summary 區已拿掉(資訊跟上班條重複)

    // ── 今日報表(時間軸 + 按案拆)──
    if(todayEntries.length>0){
      // 時間軸:把 entries + 中間 rest 段排在一起
      var timeline=[];
      todayEntries.forEach(function(e,i){
        // 補空檔(從前一筆結束到本筆開始)
        if(i>0){
          var prevEnd=todayEntries[i-1].endAt;
          var gap=e.startAt-prevEnd;
          if(gap>=5*60*1000){ // 大於 5 分鐘才算休息
            timeline.push({type:'rest',startAt:prevEnd,duration:gap});
          }
        }
        timeline.push({type:'work',entry:e});
      });
      // 時間軸區
      html+='<div class="section-head" style="margin-top:18px"><div class="section-title">今日時間軸 · <span class="section-en">Timeline</span></div></div>';
      timeline.forEach(function(t){
        if(t.type==='rest'){
          html+='<div class="tl"><span class="t">'+fmtTime(t.startAt)+'</span>';
          html+='<div class="b rest"><span class="nam">休息 / 空檔</span><span class="dur">'+fmtDur(t.duration)+'</span></div></div>';
        } else {
          var e=t.entry;
          var clientHtml=e.client?'<span class="cli">·'+e.client+'</span>':'';
          html+='<div class="tl" onclick="openEdit(\''+e.id+'\')" style="cursor:pointer">';
          html+='<span class="t">'+fmtTime(e.startAt)+'</span>';
          html+='<div class="b"><span class="nam">'+(e.projectLabel||'(無)')+clientHtml+'<span class="stg">'+stageLabel(e.stage)+'</span></span><span class="dur">'+fmtDur(entryDur(e))+'</span></div></div>';
        }
      });
      // 按案拆區
      html+='<div class="section-head" style="margin-top:18px"><div class="section-title">今日專案明細 · <span class="section-en">By Project</span></div></div>';
      // 聚合:依專案 → 各階段
      var dayMap={};
      todayEntries.forEach(function(e){
        var key=e.projectLabel||'(無)';
        if(!dayMap[key])dayMap[key]={total:0,client:e.client||'',stages:{}};
        var dur=entryDur(e);
        dayMap[key].total+=dur;
        var st=isOtherWork(e)?'其他工作':(e.stage||'其他');
        if(!dayMap[key].stages[st])dayMap[key].stages[st]={dur:0,notes:[]};
        dayMap[key].stages[st].dur+=dur;
        if(e.note)dayMap[key].stages[st].notes.push(e.note);
      });
      Object.entries(dayMap).sort(function(a,b){return b[1].total-a[1].total;}).forEach(function(p){
        var name=p[0],d=p[1];
        var clientHtml=d.client?'<span class="pb-client">·'+d.client+'</span>':'';
        html+='<div class="proj-block">';
        html+='  <div class="pb-head"><div><span class="pb-name">'+name+'</span>'+clientHtml+'</div><div class="pb-tot">'+fmtDur(d.total)+'</div></div>';
        Object.entries(d.stages).sort(function(a,b){return b[1].dur-a[1].dur;}).forEach(function(s){
          var noteText=s[1].notes.length>0?s[1].notes.slice(0,2).join(', '):'';
          html+='  <div class="pb-stage"><span class="s">'+s[0]+'</span><span class="note">'+noteText+'</span><span class="d">'+fmtDur(s[1].dur)+'</span></div>';
        });
        html+='</div>';
      });
    }
  }

  if(state.view==='report'){
    var STAGES=['前置','初剪','ES','業配','輸出','其他'];
    // 第1段:專案結算(排除其他工作)
    var projMonthMap={};
    // 第2段:其他工作明細(只取其他工作)
    var otherMonthMap={};
    // 各月份總時數
    var monthTotalAll={};

    state.entries.forEach(function(e){
      var ym=dateKey(e.startAt).slice(0,7);
      var dur=entryDur(e);
      monthTotalAll[ym]=(monthTotalAll[ym]||0)+dur;
      if(isOtherWork(e)){
        if(!otherMonthMap[ym])otherMonthMap[ym]={items:{},total:0};
        var k=e.projectLabel||'(無)';
        otherMonthMap[ym].items[k]=(otherMonthMap[ym].items[k]||0)+dur;
        otherMonthMap[ym].total+=dur;
      } else {
        if(!projMonthMap[ym])projMonthMap[ym]={};
        var key=e.projectLabel||'(無)';
        if(!projMonthMap[ym][key])projMonthMap[ym][key]={stages:{},total:0,client:e.client||'',projectId:e.projectId||''};
        var st=e.stage||'其他';
        projMonthMap[ym][key].stages[st]=(projMonthMap[ym][key].stages[st]||0)+dur;
        projMonthMap[ym][key].total+=dur;
        if(!projMonthMap[ym][key].client&&e.client)projMonthMap[ym][key].client=e.client;
        if(!projMonthMap[ym][key].projectId&&e.projectId)projMonthMap[ym][key].projectId=e.projectId;
      }
    });
    var allMonths=Object.keys(monthTotalAll).sort().reverse();
    // 預設只顯示最近 3 個月,除非展開
    var monthsToShow=state.reportShowAll?allMonths:allMonths.slice(0,3);
    var hiddenCount=allMonths.length-monthsToShow.length;

    if(allMonths.length===0){html+='<div class="empty" style="padding:60px 0">No data yet · 還沒有紀錄</div>';}
    else{
      // ── 第 1 段:每月專案結算 ──
      html+='<div class="section-head"><div class="section-title">① 每月專案結算 · <span class="section-en">Project Breakdown</span></div></div>';
      monthsToShow.forEach(function(ym){
        var projObj=projMonthMap[ym];
        if(!projObj||Object.keys(projObj).length===0)return;
        var projects=Object.entries(projObj).sort(function(a,b){return b[1].total-a[1].total;});
        var monthTotal=projects.reduce(function(s,p){return s+p[1].total;},0);
        var stageTotals={};STAGES.forEach(function(s){stageTotals[s]=0;});
        projects.forEach(function(p){STAGES.forEach(function(s){stageTotals[s]+=p[1].stages[s]||0;});});
        html+='<div class="report-block">';
        html+='  <div class="report-month-head"><span class="report-month-label">'+ym.replace('-','/')+'</span><span class="report-month-total">'+fmtDur(monthTotal)+'</span></div>';
        html+='  <table class="report-table">';
        html+='    <thead><tr><th>專案</th>';
        STAGES.forEach(function(s){html+='<th>'+s+'</th>';});
        html+='    <th>片長</th><th>合計</th><th>時薪</th></tr></thead>';
        html+='    <tbody>';
        projects.forEach(function(p){
          var data=p[1];
          var clientName=data.client?'<span class="client">·'+data.client+'</span>':'';
          html+='      <tr><td>'+p[0]+clientName+'</td>';
          STAGES.forEach(function(s){var v=data.stages[s]||0;html+='<td '+(v===0?'class="zero"':'')+'>'+(v===0?'—':fmtDur(v))+'</td>';});
          // 片長
          var proj=state.projects.find(function(x){return x.id===data.projectId;});
          var finalLen=proj?(proj.finalLen||''):'';
          html+='      <td '+(finalLen?'':'class="zero"')+'>'+(finalLen||'—')+'</td>';
          html+='      <td class="proj-total">'+fmtDur(data.total)+'</td>';
          // 時薪
          var fee=proj?(proj.fee||0):0;
          var hours=data.total/3600000;
          if(fee>0&&hours>0){
            var rate=Math.round(fee/hours);
            var rateCls=rate<1000?'low':'';
            html+='      <td class="rate"><span class="'+rateCls+'"><span class="nt">$</span>'+rate.toLocaleString()+'</span></td>';
          } else {
            html+='      <td class="rate zero">—</td>';
          }
          html+='      </tr>';
        });
        html+='    </tbody>';
        html+='    <tfoot><tr><td>小計</td>';
        STAGES.forEach(function(s){var v=stageTotals[s];html+='<td '+(v===0?'class="zero"':'')+'>'+(v===0?'—':fmtDur(v))+'</td>';});
        html+='    <td class="zero">—</td><td>'+fmtDur(monthTotal)+'</td><td class="zero">—</td></tr></tfoot>';
        html+='  </table>';
        html+='</div>';
      });

      // ── 第 2 段:每月工作時間分配 ──
      html+='<div class="section-head" style="margin-top:28px"><div class="section-title">② 每月工作時間分配 · <span class="section-en">Monthly Distribution</span></div></div>';
      monthsToShow.forEach(function(ym){
        var monthTotal=monthTotalAll[ym]||0;
        var projObj=projMonthMap[ym]||{};
        var otherObj=otherMonthMap[ym]||{items:{},total:0};
        var projTotal=Object.values(projObj).reduce(function(s,p){return s+p.total;},0);
        var otherTotal=otherObj.total;
        var workDays={};
        state.entries.forEach(function(e){if(dateKey(e.startAt).slice(0,7)===ym)workDays[dateKey(e.startAt)]=true;});
        var dayCount=Object.keys(workDays).length;

        var projRows=Object.entries(projObj).sort(function(a,b){return b[1].total-a[1].total;});
        var otherRows=Object.entries(otherObj.items).sort(function(a,b){return b[1]-a[1];});

        html+='<div class="report-block">';
        html+='  <div class="report-month-head"><span class="report-month-label">'+ym.replace('-','/')+'</span><span class="report-month-total">'+fmtDur(monthTotal)+'</span></div>';
        // 兩個 KPI 數字
        html+='  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 14px">';
        html+='    <div style="text-align:center;padding:8px 4px"><div style="font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:3px">總工時</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:500;color:var(--yellow-mid);line-height:1">'+fmtDur(monthTotal)+'</div></div>';
        html+='    <div style="text-align:center;padding:8px 4px"><div style="font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:3px">工作天</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:500;color:var(--ink-soft);line-height:1">'+dayCount+'</div></div>';
        html+='  </div>';
        // 專案工時
        if(projRows.length>0){
          html+='<div style="font-family:Inter,sans-serif;font-size:10px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin:10px 0 6px;padding-top:6px;border-top:1px dashed var(--line)">專案工時 · '+fmtDur(projTotal)+'</div>';
          var maxProj=Math.max.apply(null,projRows.map(function(r){return r[1].total;}));
          var PCOLORS=['#5fb3d4','#85c585','#ff6f9d','#a085c4','#7a9bbf','#efba2c','#c9a227','#d89a3a'];
          projRows.forEach(function(r,i){
            var w=(r[1].total/maxProj)*100;
            var clientName=r[1].client?'<span class="client">·'+r[1].client+'</span>':'';
            html+='<div class="bar-row2"><div class="nam">'+r[0]+clientName+'</div><div class="bar-wrap"><div class="bar" style="width:'+w+'%;background:'+PCOLORS[i%PCOLORS.length]+'"></div></div><div class="dur">'+fmtDur(r[1].total)+'</div></div>';
          });
        }
        // 其他工作
        if(otherRows.length>0){
          html+='<div style="font-family:Inter,sans-serif;font-size:10px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin:14px 0 6px;padding-top:8px;border-top:1px dashed var(--line)">其他工作 · '+fmtDur(otherTotal)+'</div>';
          var maxOther=Math.max.apply(null,otherRows.map(function(r){return r[1];}));
          otherRows.forEach(function(r){
            var w=(r[1]/maxOther)*100;
            html+='<div class="bar-row2"><div class="nam">'+r[0]+'</div><div class="bar-wrap"><div class="bar" style="width:'+w+'%;background:#B8862A"></div></div><div class="dur">'+fmtDur(r[1])+'</div></div>';
          });
        }
        html+='</div>';
      });
      // 展開更多月份
      if(hiddenCount>0){
        html+='<div style="text-align:center;margin-top:18px;padding-top:14px;border-top:1px dashed var(--line)"><button class="expand-btn" onclick="state.reportShowAll=true;render();">展開更早的 '+hiddenCount+' 個月 · Show '+hiddenCount+' more</button></div>';
      } else if(state.reportShowAll&&allMonths.length>3){
        html+='<div style="text-align:center;margin-top:18px;padding-top:14px;border-top:1px dashed var(--line)"><button class="expand-btn" onclick="state.reportShowAll=false;render();">收起 · Collapse</button></div>';
      }
    }
  }

  if(state.view==='daily'){
    var dailyMonth=state.dailyMonth;
    var dailyMonthDate=new Date(dailyMonth+'-01T00:00:00');
    var yearM=dailyMonth.split('-');
    var year=parseInt(yearM[0]),month=parseInt(yearM[1]);
    var firstDow=dailyMonthDate.getDay();
    var daysInMonth=new Date(year,month,0).getDate();
    // 聚合該月每天的工時
    var dayTotals={};
    state.entries.forEach(function(e){
      var wd=e.workDay||dateKey(e.startAt);
      if(wd.slice(0,7)===dailyMonth){
        var dur=entryDur(e);
        dayTotals[wd]=(dayTotals[wd]||0)+dur;
      }
    });
    // 月份切換
    html+='<div class="month-nav">';
    html+='  <button class="nav-btn" onclick="prevMonth()">‹</button>';
    html+='  <span class="month-label">'+year+'/'+pad(month)+'</span>';
    html+='  <button class="nav-btn" onclick="nextMonth()">›</button>';
    html+='</div>';
    // 迷你日曆
    html+='<div class="cal-grid">';
    ['日','一','二','三','四','五','六'].forEach(function(w){html+='<div class="cal-head">'+w+'</div>';});
    for(var i=0;i<firstDow;i++)html+='<div class="cal-day blank"></div>';
    var today=todayKey();
    for(var d=1;d<=daysInMonth;d++){
      var dayKey=dailyMonth+'-'+pad(d);
      var total=dayTotals[dayKey]||0;
      var hasData=total>0;
      var isToday=dayKey===today;
      var isSelected=dayKey===state.dailySelectedDay;
      var cls='cal-day';
      if(hasData)cls+=' has-data';
      if(!hasData&&!isToday)cls+=' empty-day';
      if(isToday)cls+=' today';
      if(isSelected)cls+=' selected';
      var clickable=hasData?' onclick="state.dailySelectedDay=\''+dayKey+'\';render();" style="cursor:pointer"':'';
      html+='<div class="'+cls+'"'+clickable+'>'+d;
      if(hasData)html+='<span class="h">'+fmtDurShort(total)+'</span>';
      html+='</div>';
    }
    html+='</div>';

    // 選中的某天詳細
    if(state.dailySelectedDay){
      var sd=state.dailySelectedDay;
      var dayEntries=state.entries.filter(function(e){return (e.workDay||dateKey(e.startAt))===sd;});
      dayEntries.sort(function(a,b){return a.startAt-b.startAt;});
      var dayTot=dayEntries.reduce(function(s,e){return s+(entryDur(e));},0);
      var sdDate=new Date(sd+'T00:00:00');
      var sdLabel=(sdDate.getMonth()+1)+'/'+sdDate.getDate()+'('+'日一二三四五六'[sdDate.getDay()]+')';
      // 找該日 shift(從歷史 + 當前)
      var sdShifts=state.shifts.filter(function(s){return s.workDay===sd;});
      var sdShiftInfo='';
      if(state.shift&&state.shift.workDay===sd){
        sdShiftInfo='上班 '+fmtTime(state.shift.startAt)+' · 還在上班中';
      } else if(sdShifts.length>0){
        var sh=sdShifts[0];
        sdShiftInfo='上班 '+fmtTime(sh.startAt)+' → 下班 '+fmtTime(sh.endAt);
      }
      html+='<div class="day-detail">';
      html+='  <div class="day-d-head"><span class="day-d-title">'+sdLabel+'</span><span class="day-d-tot">'+fmtDur(dayTot)+'</span></div>';
      if(sdShiftInfo)html+='  <div class="day-d-shift">'+sdShiftInfo+'</div>';
      if(dayEntries.length===0){
        html+='  <div class="empty">No entries · 沒有紀錄</div>';
      } else {
        dayEntries.forEach(function(e){
          var clientHtml=e.client?'<span class="cli">·'+e.client+'</span>':'';
          html+='  <div class="tl" onclick="openEdit(\''+e.id+'\')" style="cursor:pointer">';
          html+='    <span class="t">'+fmtTime(e.startAt)+'</span>';
          html+='    <div class="b"><span class="nam">'+(e.projectLabel||'(無)')+clientHtml+'<span class="stg">'+stageLabel(e.stage)+'</span></span><span class="dur">'+fmtDur(entryDur(e))+'</span></div>';
          html+='  </div>';
        });
      }
      html+='</div>';
    }
  }

  if(USE_API&&(state.loading||state.loadError)){
    var statusMsg='';
    if(state.loading)statusMsg='Loading... · 載入中';
    else if(state.loadError)statusMsg='⚠ '+state.loadError;
    html+='<div class="import-note">';
    html+='  <span class="import-note-text">'+statusMsg+'</span>';
    html+='</div>';
  }

  if(state.modal==='shift'){
    var sf=state.modalForm;
    html+='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
    html+='  <div class="modal">';
    html+='    <div class="modal-title">補上下班 · Add Past Shift</div>';
    html+='    <div style="font-family:\'Cormorant Garamond\',serif;font-style:italic;font-size:12px;color:var(--ink-light);margin-bottom:14px">標記某天的上下班時間,讓報表知道你那天有工作</div>';
    html+='    <div class="field"><div class="flabel">日期 · Day</div><input type="date" class="fc" value="'+sf.workDay+'" onchange="state.modalForm.workDay=this.value;"></div>';
    html+='    <div class="row">';
    html+='      <div class="field"><div class="flabel">上班 · Clock In</div><input type="time" class="fc" value="'+sf.startTime+'" onchange="state.modalForm.startTime=this.value;"></div>';
    html+='      <div class="field"><div class="flabel">下班 · Clock Out</div><input type="time" class="fc" value="'+sf.endTime+'" onchange="state.modalForm.endTime=this.value;"></div>';
    html+='    </div>';
    html+='    <div class="modal-btns">';
    html+='      <button class="btn-sub" onclick="closeModal()">取消</button>';
    html+='      <button class="btn-sub primary" onclick="saveShiftBackfill()">儲存</button>';
    html+='    </div>';
    html+='  </div>';
    html+='</div>';
  } else if(state.modal){
    var f=state.modalForm,isEdit=state.modal==='edit';
    html+='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
    html+='  <div class="modal">';
    html+='    <div class="modal-title">'+(isEdit?'編輯紀錄 · Edit':'手動補填 · Add Entry')+'</div>';
    html+='    <div class="field"><div class="flabel">Project / 專案</div>';
    html+='      <select class="fc" onchange="var v=this.value;var p=state.projects.find(function(x){return x.id===v;});state.modalForm.projectId=v;if(v===\'__other__\'){state.modalForm.stage=\'其他工作\';if(!state.modalForm.projectLabel||state.projects.find(function(x){return x.name===state.modalForm.projectLabel;}))state.modalForm.projectLabel=\'\';}else if(p){state.modalForm.projectLabel=p.name;state.modalForm.client=p.client;if(state.modalForm.stage===\'其他工作\')state.modalForm.stage=\'初剪\';}else{state.modalForm.projectLabel=this.options[this.selectedIndex].text;}render();">';
    html+='        <option value="">— 請選 —</option>';
    state.projects.forEach(function(p){html+='      <option value="'+p.id+'" '+(f.projectId===p.id?'selected':'')+'>【'+p.client+'】'+p.name+'</option>';});
    html+='        <option value="__other__" '+(f.projectId==='__other__'?'selected':'')+'>+ 其他工作</option>';
    html+='      </select></div>';
    html+='    <div class="row">';
    if(f.projectId==='__other__'){
      html+='      <div class="field"><div class="flabel">在做什麼? / Doing what?</div>';
      html+='        <input class="fc" value="'+(f.projectLabel||'')+'" oninput="state.modalForm.projectLabel=this.value;" placeholder="例:寫工作追蹤器"></div>';
    } else {
      html+='      <div class="field"><div class="flabel">Stage / 階段</div>';
      html+='        <select class="fc" onchange="state.modalForm.stage=this.value;">';
      ['前置','初剪','ES','業配','輸出','其他'].forEach(function(s){html+='        <option value="'+s+'" '+(f.stage===s?'selected':'')+'>'+s+'</option>';});
      html+='        </select></div>';
    }
    html+='      <div class="field"><div class="flabel">Note / 備註</div><input class="fc" value="'+(f.note||'')+'" oninput="state.modalForm.note=this.value;"></div>';
    html+='    </div>';
    html+='    <div class="row">';
    html+='      <div class="field"><div class="flabel">開始日 · Start</div><input type="date" class="fc" value="'+f.startDate+'" onchange="state.modalForm.startDate=this.value;"></div>';
    html+='      <div class="field"><div class="flabel">開始時間</div><input type="time" class="fc" value="'+f.startTime+'" onchange="state.modalForm.startTime=this.value;"></div>';
    html+='    </div>';
    html+='    <div class="row">';
    html+='      <div class="field"><div class="flabel">結束日 · End</div><input type="date" class="fc" value="'+f.endDate+'" onchange="state.modalForm.endDate=this.value;"></div>';
    html+='      <div class="field"><div class="flabel">結束時間</div><input type="time" class="fc" value="'+f.endTime+'" onchange="state.modalForm.endTime=this.value;"></div>';
    html+='    </div>';
    html+='    <div class="field"><div class="flabel">工作日 · Work Day(歸入哪一天)</div><input type="date" class="fc" value="'+(f.workDay||f.startDate)+'" onchange="state.modalForm.workDay=this.value;"></div>';
    var calcDur='';
    if(f.startDate&&f.startTime&&f.endDate&&f.endTime){
      var stMs=new Date(f.startDate+'T'+f.startTime+':00').getTime();
      var enMs=new Date(f.endDate+'T'+f.endTime+':00').getTime();
      var rngMin=Math.max(0,Math.round((enMs-stMs)/60000));
      if(typeof f.overrideDurMin==='number')calcDur=f.overrideDurMin;
      else calcDur=Math.max(0,rngMin-(f.overridePauseMin||0));
    }
    html+='    <div class="field"><div class="flabel">實工時(分鐘) · Work Min <span style="color:var(--ink-light);font-family:Cormorant Garamond,serif;font-style:italic;font-size:10px">留空=自動算</span></div><input type="number" class="fc" placeholder="例:286 表示 4h 46m" value="'+(typeof f.overrideDurMin==='number'?f.overrideDurMin:'')+'" oninput="var v=this.value.trim();if(v===\'\')delete state.modalForm.overrideDurMin;else state.modalForm.overrideDurMin=parseInt(v)||0;"></div>';
    if(calcDur!=='')html+='    <div style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:11.5px;color:var(--yellow-mid);margin-top:-6px;margin-bottom:10px;text-align:right">→ '+fmtDur(calcDur*60000)+'</div>';
    html+='    <div class="modal-btns">';
    if(isEdit)html+='      <button class="btn-sub reopen" onclick="reopenEntry(state.modalForm.id)">↩ 復原</button>';
    if(isEdit)html+='      <button class="btn-sub danger" onclick="deleteFromModal()">刪除</button>';
    html+='      <button class="btn-sub" onclick="closeModal()">取消</button>';
    html+='      <button class="btn-sub primary" onclick="saveModal()">儲存</button>';
    html+='    </div>';
    html+='  </div>';
    html+='</div>';
  }

  document.getElementById('app').innerHTML=html;
}

render();
document.addEventListener('click',function(){if(state.gearMenu){state.gearMenu=false;render();}});
if(USE_API){refreshProjects();syncFromCloud();}
</script>
</body>
</html>
