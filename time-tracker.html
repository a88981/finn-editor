<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱ 工作時間追蹤</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#E8B340;--yellow-mid:#B8862A;--yellow-soft:#F5E6B8;--yellow-pale:#FFF8DC;--yellow-lightest:#FFFBEC;
  --ink:#1A1F2E;--ink-soft:#5A6275;--ink-light:#9BA1B0;
  --paper:#FAFAF7;--line:#E5E7ED;--line-soft:#F0F2F6;
  --green:#5a8a3a;--red:#A32D2D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#E8E8E2;color:var(--ink);font-family:'Noto Sans TC','Inter',sans-serif;font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
.viewport{padding:32px 16px 60px;display:flex;justify-content:center}
.a4{width:100%;max-width:560px;background:var(--paper);padding:32px 36px 28px;position:relative;box-shadow:0 1px 2px rgba(0,0,0,0.04),0 20px 60px rgba(180,140,40,0.10),0 8px 20px rgba(180,140,40,0.05);display:flex;flex-direction:column}

.corner-l{position:absolute;top:22px;left:36px;font-family:'Inter',sans-serif;font-size:10px;color:var(--ink-light);letter-spacing:0.3em;text-transform:uppercase;font-weight:500}
.corner-r{position:absolute;top:22px;right:36px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--ink-light)}

/* Settings gear menu */
.gear-btn{position:absolute;top:18px;right:80px;width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--ink-light);font-size:16px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;border-radius:3px}
.gear-btn:hover{background:var(--yellow-lightest);color:var(--yellow-mid)}
.gear-menu{position:absolute;top:50px;right:36px;background:#fff;border:1px solid var(--line);border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,0.08);z-index:50;min-width:160px;padding:4px 0}
.gear-item{display:block;width:100%;padding:9px 16px;background:transparent;border:none;text-align:left;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink);cursor:pointer}
.gear-item:hover{background:var(--yellow-lightest);color:var(--yellow-mid)}
.gear-item .en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--ink-light);margin-left:6px}
.gear-divider{height:1px;background:var(--line);margin:4px 0}

/* 扁扁的待交件提醒列 */
.todo-tiny{background:var(--yellow-lightest);border:1px solid var(--yellow-pale);border-radius:3px;padding:6px 10px;margin-bottom:12px;font-size:11px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.todo-tiny-label{font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.18em;color:var(--ink-light);text-transform:uppercase;font-weight:500;white-space:nowrap}
.todo-tiny-item{display:inline-flex;align-items:center;gap:5px;font-size:11px}
.todo-tiny-item .due{font-family:'Noto Sans TC',sans-serif;font-size:11.5px;font-weight:500;color:var(--ink-soft);letter-spacing:0.02em}
.todo-tiny-item.overdue .due{color:#7a1818;font-weight:600}
.todo-tiny-item.urgent .due{color:var(--red);font-weight:600}
.todo-tiny-item.soon .due{color:#d8903a;font-weight:500}
.todo-tiny-item.later .due{color:#b8862a;font-weight:500}
.todo-tiny-item .nam{font-family:'Noto Serif TC',serif;color:var(--ink);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.todo-tiny-item .stage-mini{font-size:9px;color:var(--yellow-mid);background:#fff;padding:1px 4px;border-radius:2px;font-family:Inter,sans-serif;letter-spacing:0.08em;font-weight:500}
.todo-tiny .dot{color:var(--ink-light);font-size:10px}
.todo-tiny .more{color:var(--ink-light);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:11px}

.header{margin:24px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.eyebrow{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.35em;color:var(--yellow-mid);text-transform:uppercase;font-weight:500;margin-bottom:8px}
.title-row{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
.title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:500;letter-spacing:-0.01em}
.title-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--ink-light);font-weight:300;padding-bottom:3px}

.tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--line)}
.tab{flex:1;padding:9px 12px;background:transparent;border:none;color:var(--ink-light);font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;position:relative}
.tab:hover{color:var(--ink-soft)}
.tab.active{color:var(--yellow-mid)}
.tab.active::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--yellow)}

.punch-card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-bottom:14px}
.punch-head{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-light);font-weight:500;margin-bottom:9px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:9px}
.row3{display:grid;grid-template-columns:1fr 130px 80px;gap:10px;align-items:flex-end}
.flabel{font-family:'Inter',sans-serif;font-size:9.5px;letter-spacing:0.15em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:4px}
.fc{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--line);border-radius:3px;background:#fff;font-family:inherit;color:var(--ink)}
.fc:focus{outline:none;border-color:var(--yellow)}
.btn-start{padding:8px 14px;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:none;background:var(--yellow);color:#fff;cursor:pointer;font-family:'Inter',sans-serif}
.btn-start:hover{background:var(--yellow-mid)}

.active-section{margin-bottom:18px}
.active-card{background:#fff;border-left:3px solid var(--green);border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:0 3px 3px 0;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ac-info{flex:1;min-width:0}
.ac-time{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;margin-bottom:3px;letter-spacing:0.03em}
.ac-proj{font-size:13.5px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Noto Serif TC',serif}
.ac-meta{font-size:10.5px;color:var(--ink-light);margin-top:2px;font-family:'Cormorant Garamond',serif;font-style:italic}
.ac-meta .stage{display:inline-block;font-family:'Inter',sans-serif;font-style:normal;font-size:9.5px;letter-spacing:0.12em;padding:1px 5px;border-radius:2px;background:var(--yellow-pale);color:var(--yellow-mid);font-weight:500;margin-right:6px;text-transform:uppercase}
.ac-time-start{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--green);letter-spacing:0.04em;line-height:1;margin-bottom:5px;font-variant-numeric:tabular-nums}
.ac-time-start.paused{color:#d8903a}
.ac-time-start .ac-start-label{font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.25em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-left:4px}
.active-card.paused{border-left-color:#d8903a;background:var(--yellow-lightest)}
.ac-btns{display:flex;flex-direction:column;gap:5px}
.ac-btn-mini{padding:5px 11px;font-size:9.5px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:1px solid;background:#fff;cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap}
.ac-btn-mini.pause{border-color:#d8903a;color:#d8903a}
.ac-btn-mini.pause:hover{background:var(--yellow-lightest)}
.ac-btn-mini.resume{border-color:var(--green);background:var(--green);color:#fff}
.ac-btn-mini.resume:hover{background:#487228}
.ac-btn-mini.stop{border-color:var(--red);color:var(--red)}
.ac-btn-mini.stop:hover{background:#fcebeb}
.ac-stop{padding:6px 13px;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;font-family:'Inter',sans-serif}
.ac-stop:hover{background:#fcebeb}

.section-head{display:flex;justify-content:space-between;align-items:baseline;margin:18px 0 8px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.section-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:500}
.section-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--ink-light);font-weight:300}
.total{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--yellow-mid)}

.summary{background:var(--yellow-lightest);border:1px solid var(--yellow-soft);border-radius:4px;padding:13px 16px;margin:14px 0 6px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.summary-block{text-align:center}
.summary-label{font-family:'Inter',sans-serif;font-size:9.5px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:4px}
.summary-value{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
.summary-value.work{color:var(--yellow-mid)}
.summary-value.rest{color:var(--ink-light);font-style:italic}
.summary-value.span{color:var(--ink-soft)}
.summary-range{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--ink-light);margin-top:2px}

.entry{display:grid;grid-template-columns:95px 1fr 55px 70px 22px;gap:10px;padding:9px 4px;border-bottom:1px dashed var(--line);font-size:12.5px;align-items:center;cursor:pointer}
.entry:hover{background:var(--yellow-lightest)}
.entry:last-child{border-bottom:none}
.entry .time{font-family:'Cormorant Garamond',serif;font-size:12.5px;color:var(--ink-soft);letter-spacing:0.02em;font-variant-numeric:tabular-nums}
.entry .proj{font-weight:400;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Noto Serif TC',serif}
.entry .stage{font-size:9.5px;color:var(--yellow-mid);text-align:center;background:var(--yellow-pale);padding:2px 5px;border-radius:2px;font-family:'Inter',sans-serif;letter-spacing:0.1em;font-weight:500;text-transform:uppercase}
.entry .dur{text-align:right;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}
.entry .del{text-align:center;color:var(--ink-light);font-size:14px;line-height:1}
.entry .del:hover{color:var(--red)}
.empty{text-align:center;padding:36px 0;color:var(--ink-light);font-size:12px;font-family:'Cormorant Garamond',serif;font-style:italic}

.report-block{margin-top:16px}
.report-month-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:6px;border-bottom:1px solid var(--line)}
.report-month-label{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--yellow-mid);letter-spacing:0.03em}
.report-month-total{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--ink-soft)}
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.report-table th{padding:7px 6px;text-align:right;font-family:'Inter',sans-serif;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);border-bottom:1px solid var(--line)}
.report-table th:first-child{text-align:left}
.report-table td{padding:7px 6px;text-align:right;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums;border-bottom:1px dashed var(--line)}
.report-table td:first-child{font-family:'Noto Serif TC',serif;color:var(--ink);font-size:12.5px;text-align:left;font-weight:400}
.report-table td.zero{color:var(--ink-light)}
.report-table td.proj-total{color:var(--yellow-mid);font-weight:500}
.report-table tfoot td{background:var(--yellow-lightest);font-weight:500;color:var(--ink);border-top:1px solid var(--line);border-bottom:none}
.report-table tfoot td:first-child{color:var(--ink-soft);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;font-weight:500}

.bar-row2{display:grid;grid-template-columns:110px 1fr 70px;gap:10px;padding:5px 0;font-size:12.5px;align-items:center}
.bar-row2 .nam{font-family:'Noto Serif TC',serif;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row2 .bar-wrap{height:6px;background:#f0ece0;border-radius:3px;overflow:hidden}
.bar-row2 .bar{height:100%;border-radius:3px}
.bar-row2 .dur{text-align:right;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums}

.import-note{background:var(--yellow-lightest);border-left:3px solid var(--yellow);padding:11px 16px;margin-top:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.import-note-text{font-family:'Noto Serif TC',serif;font-size:12px;color:var(--ink);letter-spacing:0.06em}
.import-note-text .italic{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft)}
.import-btn{padding:5px 12px;font-size:10px;font-weight:500;border:1px solid var(--yellow);background:#fff;color:var(--yellow-mid);border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.18em;text-transform:uppercase}

.modal-overlay{position:fixed;inset:0;background:rgba(40,35,25,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--paper);border-radius:4px;width:100%;max-width:440px;padding:26px 30px;border:1px solid var(--line);max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.15)}
.modal-title{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:500;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.modal .field{margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
.btn-sub{padding:7px 16px;font-size:10px;font-weight:500;border-radius:3px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.2em;text-transform:uppercase}
.btn-sub.primary{background:var(--yellow);color:#fff;border-color:var(--yellow)}
.btn-sub.danger{background:#fff;color:var(--red);border-color:var(--red)}

@media (max-width:520px){
  .a4{padding:24px 22px 24px}
  .corner-l,.corner-r{font-size:9px}
  .title{font-size:20px}
  .row3{grid-template-columns:1fr;gap:8px}
  .summary{grid-template-columns:1fr;gap:10px}
}
</style>
</head>
<body>
<div class="viewport"><article class="a4" id="app"></article></div>

<script>
var API="/api/notion",USE_API=true;
var ENTRIES_KEY='timeTrackerEntries_v2',ACTIVE_KEY='timeTrackerActive_v2',PROJECTS_KEY='timeTrackerProjects_v2';
function ls_get(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function ls_set(k,v){localStorage.setItem(k,JSON.stringify(v));}
function uid(){return 'e'+Date.now()+Math.random().toString(36).slice(2,7);}
function pad(n){return String(n).padStart(2,'0');}
function fmtTime(ts){var d=new Date(ts);return pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtDur(ms){if(ms<=0)return '0m';var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h===0)return m+'m';return h+'h'+(m>0?' '+m+'m':'');}
function fmtClock(ms){var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return pad(h)+':'+pad(m)+':'+pad(ss);}
function fmtDateEN(ts){var d=new Date(ts);var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}
function dayOfWeekEN(){var w=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];return w[new Date().getDay()];}
function todayKey(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function dateKey(ts){var d=new Date(ts);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function nowHM(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
function tsFromHM(hm){var d=new Date(),p=hm.split(':');d.setHours(parseInt(p[0])||0,parseInt(p[1])||0,0,0);return d.getTime();}
function stageLabel(s){return s||'其他';}
function isOtherWork(e){return e&&e.projectId==='__other__';}

function apiListProjects(cb){fetch(API,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
  var arr=null;
  if(Array.isArray(d))arr=d;
  else if(d&&Array.isArray(d.projects))arr=d.projects;
  if(arr){
    var WAIT=['等待素材','待確認','暫緩'];
    var ps=arr.filter(function(p){
      if(p.closed)return false;
      if(p.status==='Final完成')return false;
      if(p.finalDone)return false;
      if(WAIT.indexOf(p.status)>=0)return false;
      return true;
    }).map(function(p){return {
      id:p.id,notionId:p.notionId,client:p.client,name:p.name,type:p.type||'',
      cut1Due:p.cut1Due||'',cut1Done:!!p.cut1Done,noCut1:!!p.noCut1,
      v1Due:p.v1Due||'',v1Done:!!p.v1Done,
      bizDue:p.bizDue||'',bizDone:!!p.bizDone,noBiz:!!p.noBiz,
      finalDue:p.finalDue||'',finalDone:!!p.finalDone
    };});
    cb(null,ps);
  }
  else cb((d&&d.error)||'API error');
}).catch(function(e){cb(e.message||'Network error');});}
function apiListEntries(cb){fetch(API+'?action=time-list',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
  var arr=null;
  if(Array.isArray(d))arr=d;
  else if(d&&Array.isArray(d.entries))arr=d.entries;
  if(arr)cb(null,arr);else cb((d&&d.error)||'API error');
}).catch(function(e){cb(e.message||'Network error');});}
function apiSaveEntry(entry,cb){fetch(API+'?action=time-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry),cache:'no-store'}).then(function(r){return r.json();}).then(function(d){if(d.ok)cb(null,d.notionId);else cb(d.error||'Save error');}).catch(function(e){cb(e.message||'Network error');});}
function apiDeleteEntry(notionId,cb){fetch(API+'?action=time-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notionId:notionId}),cache:'no-store'}).then(function(r){return r.json();}).then(function(d){cb(d.ok?null:(d.error||'Delete error'));}).catch(function(e){cb(e.message||'Network error');});}

var state={
  view:'today',
  gearMenu:false,
  newProjId:'', // 新增打卡選的專案(空 / id / __other__)
  newOtherName:'', // 其他工作的自由命名
  active:ls_get(ACTIVE_KEY)||[],
  entries:ls_get(ENTRIES_KEY)||[],
  projects:ls_get(PROJECTS_KEY)||[],
  modal:null,modalForm:{},loading:false,loadError:null
};

// (進行中卡片改成靜態顯示「14:30 開始」,不需要每秒重繪)

function startPunch(){
  var projSel=document.getElementById('proj-select');
  var noteInput=document.getElementById('note-input');
  var startInput=document.getElementById('start-input');
  if(!projSel||!projSel.value){alert('請選專案');return;}
  var isOther=projSel.value==='__other__';
  var label,stage,client;
  if(isOther){
    var otherName=(state.newOtherName||'').trim();
    if(!otherName){alert('請輸入你在做什麼');return;}
    label=otherName;
    stage='其他工作';
    client='';
  } else {
    var proj=state.projects.find(function(p){return p.id===projSel.value;});
    label=proj?proj.name:projSel.options[projSel.selectedIndex].text;
    var stageSel=document.getElementById('stage-select');
    stage=stageSel?(stageSel.value||'其他'):'其他';
    client=proj?proj.client:'';
  }
  state.active.push({
    id:uid(),projectId:projSel.value,
    projectLabel:label,
    client:client,
    stage:stage,note:noteInput?(noteInput.value||''):'',
    startAt:tsFromHM(startInput.value||nowHM())
  });
  ls_set(ACTIVE_KEY,state.active);
  // 重置
  state.newProjId='';state.newOtherName='';
  render();
}

function pausePunch(id){
  var item=state.active.find(function(x){return x.id===id;});
  if(!item||item.pausedAt)return;
  item.pausedAt=Date.now();
  ls_set(ACTIVE_KEY,state.active);render();
}
function resumePunch(id){
  var item=state.active.find(function(x){return x.id===id;});
  if(!item||!item.pausedAt)return;
  item.pauseTotal=(item.pauseTotal||0)+(Date.now()-item.pausedAt);
  item.pausedAt=null;
  ls_set(ACTIVE_KEY,state.active);render();
}
function stopPunch(id){
  var item=state.active.find(function(x){return x.id===id;});
  if(!item)return;
  var endAt=Date.now();
  // 若還在暫停中,先把暫停時段結算掉
  var pauseTotal=item.pauseTotal||0;
  if(item.pausedAt)pauseTotal+=(endAt-item.pausedAt);
  // 工作毫秒數 = 結束 - 開始 - 暫停總和(A 方案:加總,扣除暫停)
  var workMs=Math.max(0,endAt-item.startAt-pauseTotal);
  var entry={
    id:item.id,projectId:item.projectId,projectLabel:item.projectLabel,
    client:item.client,stage:item.stage,note:item.note,
    startAt:item.startAt,endAt:endAt,
    durMin:Math.round(workMs/60000),
    pauseTotal:pauseTotal // 紀錄暫停總時長以供顯示
  };
  state.entries.unshift(entry);
  state.active=state.active.filter(function(x){return x.id!==id;});
  ls_set(ENTRIES_KEY,state.entries);ls_set(ACTIVE_KEY,state.active);
  render();
  if(USE_API)apiSaveEntry(entry,function(err,notionId){if(err){console.warn('儲存失敗',err);return;}if(notionId){entry.notionId=notionId;state.entries=state.entries.map(function(e){return e.id===entry.id?entry:e;});ls_set(ENTRIES_KEY,state.entries);}});
}

function deleteEntry(id){
  if(!confirm('確定刪除這筆紀錄?'))return;
  var ent=state.entries.find(function(e){return e.id===id;});
  state.entries=state.entries.filter(function(e){return e.id!==id;});
  ls_set(ENTRIES_KEY,state.entries);render();
  if(USE_API&&ent&&ent.notionId)apiDeleteEntry(ent.notionId,function(err){if(err)console.warn('刪除失敗',err);});
}

function openEdit(id){var e=state.entries.find(function(x){return x.id===id;});if(!e)return;state.modalForm={id:e.id,notionId:e.notionId,projectId:e.projectId,projectLabel:e.projectLabel,client:e.client||'',stage:e.stage,note:e.note||'',startDate:dateKey(e.startAt),startTime:fmtTime(e.startAt),endDate:dateKey(e.endAt),endTime:fmtTime(e.endAt)};state.modal='edit';render();}
function openManual(){var now=new Date(),start=new Date(now.getTime()-3600000);state.modalForm={projectId:'',projectLabel:'',client:'',stage:'初剪',note:'',startDate:dateKey(start),startTime:fmtTime(start),endDate:dateKey(now),endTime:fmtTime(now)};state.modal='manual';render();}
function closeModal(){state.modal=null;render();}

function saveModal(){
  var f=state.modalForm;
  if(!f.projectLabel){alert('請選專案');return;}
  var startAt=new Date(f.startDate+'T'+f.startTime+':00').getTime();
  var endAt=new Date(f.endDate+'T'+f.endTime+':00').getTime();
  if(endAt<=startAt){alert('結束時間要在開始之後');return;}
  var entry;
  if(f.id){state.entries=state.entries.map(function(e){if(e.id===f.id){entry=Object.assign({},e,{projectId:f.projectId,projectLabel:f.projectLabel,client:f.client,stage:f.stage,note:f.note,startAt:startAt,endAt:endAt,durMin:Math.round((endAt-startAt)/60000)});return entry;}return e;});}
  else{entry={id:uid(),projectId:f.projectId,projectLabel:f.projectLabel,client:f.client,stage:f.stage,note:f.note,startAt:startAt,endAt:endAt,durMin:Math.round((endAt-startAt)/60000)};state.entries.unshift(entry);}
  state.entries.sort(function(a,b){return b.startAt-a.startAt;});
  ls_set(ENTRIES_KEY,state.entries);closeModal();
  if(USE_API&&entry)apiSaveEntry(entry,function(err,notionId){if(err){console.warn('儲存失敗',err);return;}if(notionId){entry.notionId=notionId;state.entries=state.entries.map(function(e){return e.id===entry.id?entry:e;});ls_set(ENTRIES_KEY,state.entries);render();}});
}

function deleteFromModal(){if(!state.modalForm.id||!confirm('確定刪除?'))return;var ent=state.entries.find(function(e){return e.id===state.modalForm.id;});state.entries=state.entries.filter(function(e){return e.id!==state.modalForm.id;});ls_set(ENTRIES_KEY,state.entries);closeModal();if(USE_API&&ent&&ent.notionId)apiDeleteEntry(ent.notionId,function(err){if(err)console.warn('刪除失敗',err);});}

function refreshProjects(){state.loading=true;state.loadError=null;render();apiListProjects(function(err,ps){state.loading=false;if(err)state.loadError=err;else{state.projects=ps;ls_set(PROJECTS_KEY,ps);}render();});}
function syncFromCloud(){apiListEntries(function(err,entries){if(err){console.warn('雲端讀取失敗',err);return;}state.entries=entries;ls_set(ENTRIES_KEY,entries);render();});}

// ── 匯出/匯入 ──
function downloadFile(filename,content,type){
  var blob=new Blob([content],{type:type});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function exportJSON(){
  var data={
    version:1,
    exportedAt:new Date().toISOString(),
    entries:state.entries,
    projects:state.projects
  };
  var today=todayKey();
  downloadFile('time-tracker-backup-'+today+'.json',JSON.stringify(data,null,2),'application/json');
}

function exportCSV(){
  // 兩段:打卡紀錄 + 結算表
  var lines=[];
  // 第一段:打卡紀錄
  lines.push('# 打卡紀錄 · Entries');
  lines.push('日期,開始,結束,客戶,專案,階段,備註,時長(分)');
  state.entries.slice().sort(function(a,b){return b.startAt-a.startAt;}).forEach(function(e){
    var dur=Math.round((e.endAt-e.startAt)/60000);
    var row=[
      dateKey(e.startAt),
      fmtTime(e.startAt),
      fmtTime(e.endAt),
      csvEsc(e.client||''),
      csvEsc(e.projectLabel||''),
      csvEsc(e.stage||''),
      csvEsc(e.note||''),
      dur
    ];
    lines.push(row.join(','));
  });
  lines.push('');
  // 第二段:結算表(按月份 × 階段)
  lines.push('# 結算表 · Monthly Report');
  var STAGES=['前置','初剪','ES','業配','其他'];
  lines.push('月份,專案,'+STAGES.join(',')+',合計');
  var monthMap={};
  state.entries.forEach(function(e){
    var ym=dateKey(e.startAt).slice(0,7);
    if(!monthMap[ym])monthMap[ym]={};
    var key=e.projectLabel||'(無)';
    if(!monthMap[ym][key])monthMap[ym][key]={stages:{},total:0};
    var dur=e.endAt-e.startAt,st=e.stage||'其他';
    monthMap[ym][key].stages[st]=(monthMap[ym][key].stages[st]||0)+dur;
    monthMap[ym][key].total+=dur;
  });
  Object.keys(monthMap).sort().reverse().forEach(function(ym){
    Object.entries(monthMap[ym]).sort(function(a,b){return b[1].total-a[1].total;}).forEach(function(p){
      var row=[ym,csvEsc(p[0])];
      STAGES.forEach(function(s){
        var ms=p[1].stages[s]||0;
        row.push(ms>0?Math.round(ms/60000):0);
      });
      row.push(Math.round(p[1].total/60000));
      lines.push(row.join(','));
    });
  });
  var bom='\uFEFF'; // UTF-8 BOM,讓 Excel 開不亂碼
  var today=todayKey();
  downloadFile('time-tracker-'+today+'.csv',bom+lines.join('\n'),'text/csv;charset=utf-8');
}

function csvEsc(s){s=String(s||'');if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)return '"'+s.replace(/"/g,'""')+'"';return s;}

function importJSON(input){
  if(!input.files[0])return;
  if(!confirm('匯入會覆蓋目前的打卡紀錄,確定?'))return;
  var file=input.files[0];
  var r=new FileReader();
  r.onload=function(){
    try{
      var data=JSON.parse(r.result);
      var entries=data.entries||(Array.isArray(data)?data:[]);
      if(!Array.isArray(entries)){alert('檔案格式不對');return;}
      state.entries=entries;
      ls_set(ENTRIES_KEY,entries);
      render();
      alert('已匯入 '+entries.length+' 筆紀錄(注意:這只還原本機,沒同步到 Notion)');
    }catch(e){alert('讀取失敗:'+e.message);}
  };
  r.readAsText(file);
}

function render(){
  var html='';
  html+='<div class="corner-l">Time Tracker</div>';
  html+='<div class="corner-r">'+fmtDateEN(Date.now())+'</div>';
  html+='<button class="gear-btn" onclick="event.stopPropagation();state.gearMenu=!state.gearMenu;render();" title="設定">⚙</button>';

    html+='<div class="gear-menu" onclick="event.stopPropagation()">';
    html+='  <button class="gear-item" onclick="state.gearMenu=false;refreshProjects();syncFromCloud();">重新整理<span class="en">Refresh</span></button>';
    html+='  <div class="gear-divider"></div>';
    html+='  <button class="gear-item" onclick="state.gearMenu=false;render();exportJSON();">備份資料<span class="en">Backup JSON</span></button>';

    html+='  <div class="gear-divider"></div>';
    html+='  <button class="gear-item" onclick="state.gearMenu=false;render();document.getElementById(\'imp-file\').click();">還原備份<span class="en">Restore</span></button>';
    html+='  <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importJSON(this)">';
    html+='</div>';
  }
  html+='<header class="header">';
  html+='  <div class="eyebrow">Daily Time Log · 2026</div>';
  html+='  <div class="title-row"><h1 class="title">⏱ 工作時間追蹤</h1><span class="title-sub">'+dayOfWeekEN()+'</span></div>';
  html+='</header>';
  html+='<div class="tabs">';
  ['today','report'].forEach(function(v){var lab={today:'⏱ Today',report:'📊 Report'}[v];html+='<button class="tab '+(state.view===v?'active':'')+'" onclick="state.view=\''+v+'\';render();">'+lab+'</button>';});
  html+='</div>';

  if(state.view==='today'){
    // 待交件提醒列(扁扁的金黃條)
    var todos=[];
    var todayD=new Date();todayD.setHours(0,0,0,0);
    state.projects.forEach(function(p){
      var stages=[
        {key:'cut1',done:p.cut1Done,due:p.cut1Due,skip:p.noCut1,label:'初剪'},
        {key:'v1',done:p.v1Done,due:p.v1Due,skip:false,label:'ES'},
        {key:'biz',done:p.bizDone,due:p.bizDue,skip:p.noBiz,label:'業配'},
        {key:'final',done:p.finalDone,due:p.finalDue,skip:false,label:'Final'}
      ];
      stages.forEach(function(s){
        if(s.skip||s.done||!s.due)return;
        var d=new Date(s.due);d.setHours(0,0,0,0);
        var days=Math.round((d-todayD)/86400000);
        if(days<-7)return; // 7天以前的不顯示
        todos.push({name:p.name,client:p.client,stage:s.label,due:s.due,days:days});
      });
    });
    todos.sort(function(a,b){return a.days-b.days;});
    if(todos.length>0){
      html+='<div class="todo-tiny">';
      html+='  <span class="todo-tiny-label">📌 待交</span>';
      var showCount=Math.min(todos.length,3);
      for(var i=0;i<showCount;i++){
        var t=todos[i];
        var cls=t.days<0?'overdue':(t.days<=1?'urgent':(t.days<=5?'soon':'later'));
        var lbl=t.days<0?Math.abs(t.days)+'天前':(t.days===0?'今天':(t.days===1?'明天':t.days+'天'));
        if(i>0)html+='<span class="dot">·</span>';
        html+='  <span class="todo-tiny-item '+cls+'"><span class="due">'+lbl+'</span><span class="nam">'+t.name+'</span><span class="stage-mini">'+t.stage+'</span></span>';
      }
      if(todos.length>showCount)html+='<span class="more">+'+(todos.length-showCount)+'</span>';
      html+='</div>';
    }
    html+='<div class="punch-card">';
    html+='  <div class="punch-head">+ 新增打卡 · Punch In</div>';
    html+='  <div class="row">';
    html+='    <div><div class="flabel">Project / 專案</div>';
    html+='      <select id="proj-select" class="fc" onchange="state.newProjId=this.value;render();">';
    html+='        <option value="">— 請選 —</option>';
    state.projects.forEach(function(p){html+='        <option value="'+p.id+'" '+(state.newProjId===p.id?'selected':'')+'>【'+p.client+'】'+p.name+'</option>';});
    html+='        <option value="__other__" '+(state.newProjId==='__other__'?'selected':'')+'>+ 其他工作</option>';
    html+='      </select></div>';
    if(state.newProjId==='__other__'){
      html+='    <div><div class="flabel">在做什麼? / Doing what?</div>';
      html+='      <input id="other-name-input" class="fc" placeholder="例:寫工作追蹤器" value="'+(state.newOtherName||'')+'" oninput="state.newOtherName=this.value">';
      html+='    </div>';
    } else {
      html+='    <div><div class="flabel">Stage / 階段</div>';
      html+='      <select id="stage-select" class="fc">';
      ['前置','初剪','ES','業配','其他'].forEach(function(s){html+='        <option value="'+s+'">'+s+'</option>';});
      html+='      </select></div>';
    }
    html+='  </div>';
    html+='  <div class="row3">';
    html+='    <div><div class="flabel">Note / 備註</div><input id="note-input" class="fc" placeholder="修頭尾"></div>';
    html+='    <div><div class="flabel">Start / 開始</div><input id="start-input" type="time" class="fc" value="'+nowHM()+'"></div>';
    html+='    <button class="btn-start" onclick="startPunch()">▸ Start</button>';
    html+='  </div>';
    html+='</div>';

    if(state.active.length>0){
      html+='<div class="active-section">';
      html+='  <div class="section-head"><div class="section-title">進行中 · <span class="section-en">Active ('+state.active.length+')</span></div></div>';
      state.active.forEach(function(item){
        var isPaused=!!item.pausedAt;
        html+='  <div class="active-card '+(isPaused?'paused':'')+'">';
        html+='    <div class="ac-info">';
        html+='      <div class="ac-time-start '+(isPaused?'paused':'')+'">'+fmtTime(item.startAt)+' <span class="ac-start-label">'+(isPaused?'開始 · 暫停中':'開始')+'</span></div>';
        html+='      <div class="ac-proj">'+(item.projectLabel||'(無)')+'</div>';
        html+='      <div class="ac-meta"><span class="stage">'+stageLabel(item.stage)+'</span>'+(item.note||'')+'</div>';
        html+='    </div>';
        html+='    <div class="ac-btns">';
        if(isPaused){
          html+='      <button class="ac-btn-mini resume" onclick="resumePunch(\''+item.id+'\')">▸ 繼續</button>';
        } else {
          html+='      <button class="ac-btn-mini pause" onclick="pausePunch(\''+item.id+'\')">‖ 暫停</button>';
        }
        html+='      <button class="ac-btn-mini stop" onclick="stopPunch(\''+item.id+'\')">■ 結束</button>';
        html+='    </div>';
        html+='  </div>';
      });
      html+='</div>';
    }

    var today=todayKey();
    var todayEntries=state.entries.filter(function(e){return dateKey(e.startAt)===today;});
    todayEntries.sort(function(a,b){return a.startAt-b.startAt;});
    var workMs=todayEntries.reduce(function(s,e){return s+(e.endAt-e.startAt);},0);
    var spanMs=0,restMs=0,spanLabel='—';
    if(todayEntries.length>0){
      var firstStart=todayEntries[0].startAt;
      var lastEnd=Math.max.apply(null,todayEntries.map(function(e){return e.endAt;}));
      state.active.forEach(function(a){if(dateKey(a.startAt)===today){if(a.startAt<firstStart)firstStart=a.startAt;if(Date.now()>lastEnd)lastEnd=Date.now();}});
      spanMs=lastEnd-firstStart;
      restMs=Math.max(0,spanMs-workMs);
      spanLabel=fmtTime(firstStart)+' → '+fmtTime(lastEnd);
    } else if(state.active.length>0){
      var actToday=state.active.filter(function(a){return dateKey(a.startAt)===today;});
      if(actToday.length>0){var firstActive=Math.min.apply(null,actToday.map(function(a){return a.startAt;}));spanMs=Date.now()-firstActive;spanLabel=fmtTime(firstActive)+' → 現在';}
    }
    if(todayEntries.length>0||state.active.length>0){
      html+='<div class="summary">';
      html+='  <div class="summary-block"><div class="summary-label">Working</div><div class="summary-value work">'+fmtDur(workMs)+'</div></div>';
      html+='  <div class="summary-block"><div class="summary-label">Rest</div><div class="summary-value rest">'+fmtDur(restMs)+'</div></div>';
      html+='  <div class="summary-block"><div class="summary-label">Span</div><div class="summary-value span">'+fmtDur(spanMs)+'</div><div class="summary-range">'+spanLabel+'</div></div>';

  if(state.view==='report'){
    var STAGES=['前置','初剪','ES','業配','其他'];

      var ym=dateKey(e.startAt).slice(0,7);

        if(!projMonthMap[ym][key])projMonthMap[ym][key]={stages:{},total:0};

        projMonthMap[ym][key].stages[st]=(projMonthMap[ym][key].stages[st]||0)+dur;

    var allMonths=Object.keys(monthTotalAll).sort().reverse();

    if(allMonths.length===0){html+='<div class="empty" style="padding:60px 0">No data yet · 還沒有紀錄</div>';}
    else{
      // ── 第 1 段:每月專案結算 ──

      allMonths.forEach(function(ym){

        var projects=Object.entries(projObj).sort(function(a,b){return b[1].total-a[1].total;});
        var monthTotal=projects.reduce(function(s,p){return s+p[1].total;},0);
        var stageTotals={};STAGES.forEach(function(s){stageTotals[s]=0;});
        projects.forEach(function(p){STAGES.forEach(function(s){stageTotals[s]+=p[1].stages[s]||0;});});

          html+='      <td class="proj-total">'+fmtDur(p[1].total)+'</td></tr>';
        });
        html+='    </tbody>';
        html+='    <tfoot><tr><td>小計</td>';
        STAGES.forEach(function(s){var v=stageTotals[s];html+='<td '+(v===0?'class="zero"':'')+'>'+(v===0?'—':fmtDur(v))+'</td>';});
        html+='    <td>'+fmtDur(monthTotal)+'</td></tr></tfoot>';
        html+='  </table>';
        html+='</div>';
      });

      // ── 第 2 段:每月工作時間分配 ──
      html+='<div class="section-head" style="margin-top:28px"><div class="section-title">② 每月工作時間分配 · <span class="section-en">Monthly Distribution</span></div></div>';
      allMonths.forEach(function(ym){
        var monthTotal=monthTotalAll[ym]||0;
        var projObj=projMonthMap[ym]||{};
        var otherObj=otherMonthMap[ym]||{items:{},total:0};
        var projTotal=Object.values(projObj).reduce(function(s,p){return s+p.total;},0);
        var otherTotal=otherObj.total;
        var workDays={};
        state.entries.forEach(function(e){if(dateKey(e.startAt).slice(0,7)===ym)workDays[dateKey(e.startAt)]=true;});
        var dayCount=Object.keys(workDays).length;

        var projRows=Object.entries(projObj).sort(function(a,b){return b[1].total-a[1].total;});
        var otherRows=Object.entries(otherObj.items).sort(function(a,b){return b[1]-a[1];});

        html+='<div class="report-block">';
        html+='  <div class="report-month-head"><span class="report-month-label">'+ym.replace('-','/')+'</span><span class="report-month-total">'+fmtDur(monthTotal)+'</span></div>';
        // 兩個 KPI 數字
        html+='  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 14px">';
        html+='    <div style="text-align:center;padding:8px 4px"><div style="font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:3px">總工時</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:500;color:var(--yellow-mid);line-height:1">'+fmtDur(monthTotal)+'</div></div>';
        html+='    <div style="text-align:center;padding:8px 4px"><div style="font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin-bottom:3px">工作天</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:500;color:var(--ink-soft);line-height:1">'+dayCount+'</div></div>';
        html+='  </div>';
        // 專案工時
        if(projRows.length>0){
          html+='<div style="font-family:Inter,sans-serif;font-size:10px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin:10px 0 6px;padding-top:6px;border-top:1px dashed var(--line)">專案工時 · '+fmtDur(projTotal)+'</div>';
          var maxProj=Math.max.apply(null,projRows.map(function(r){return r[1].total;}));
          var PCOLORS=['#5fb3d4','#85c585','#ff6f9d','#a085c4','#7a9bbf','#efba2c','#c9a227','#d89a3a'];
          projRows.forEach(function(r,i){
            var w=(r[1].total/maxProj)*100;
            html+='<div class="bar-row2"><div class="nam">'+r[0]+'</div><div class="bar-wrap"><div class="bar" style="width:'+w+'%;background:'+PCOLORS[i%PCOLORS.length]+'"></div></div><div class="dur">'+fmtDur(r[1].total)+'</div></div>';
          });
        }
        // 其他工作
        if(otherRows.length>0){
          html+='<div style="font-family:Inter,sans-serif;font-size:10px;letter-spacing:0.2em;color:var(--ink-light);text-transform:uppercase;font-weight:500;margin:14px 0 6px;padding-top:8px;border-top:1px dashed var(--line)">其他工作 · '+fmtDur(otherTotal)+'</div>';
          var maxOther=Math.max.apply(null,otherRows.map(function(r){return r[1];}));
          otherRows.forEach(function(r){
            var w=(r[1]/maxOther)*100;
            html+='<div class="bar-row2"><div class="nam">'+r[0]+'</div><div class="bar-wrap"><div class="bar" style="width:'+w+'%;background:#B8862A"></div></div><div class="dur">'+fmtDur(r[1])+'</div></div>';
          });
        }
        html+='</div>';
      });
    }
  }

  if(USE_API&&(state.loading||state.loadError)){
    var statusMsg='';
    if(state.loading)statusMsg='Loading... · 載入中';
    else if(state.loadError)statusMsg='⚠ '+state.loadError;
    html+='<div class="import-note">';
    html+='  <span class="import-note-text">'+statusMsg+'</span>';
    html+='</div>';
  }

  if(state.modal){
    var f=state.modalForm,isEdit=state.modal==='edit';
    html+='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
    html+='  <div class="modal">';
    html+='    <div class="modal-title">'+(isEdit?'編輯紀錄 · Edit':'手動補填 · Add Entry')+'</div>';
    html+='    <div class="field"><div class="flabel">Project / 專案</div>';
    html+='      <select class="fc" onchange="var v=this.value;var p=state.projects.find(function(x){return x.id===v;});state.modalForm.projectId=v;if(v===\'__other__\'){state.modalForm.stage=\'其他工作\';if(!state.modalForm.projectLabel||state.projects.find(function(x){return x.name===state.modalForm.projectLabel;}))state.modalForm.projectLabel=\'\';}else if(p){state.modalForm.projectLabel=p.name;state.modalForm.client=p.client;if(state.modalForm.stage===\'其他工作\')state.modalForm.stage=\'初剪\';}else{state.modalForm.projectLabel=this.options[this.selectedIndex].text;}render();">';
    html+='        <option value="">— 請選 —</option>';
    state.projects.forEach(function(p){html+='      <option value="'+p.id+'" '+(f.projectId===p.id?'selected':'')+'>【'+p.client+'】'+p.name+'</option>';});
    html+='        <option value="__other__" '+(f.projectId==='__other__'?'selected':'')+'>+ 其他工作</option>';
    html+='      </select></div>';
    html+='    <div class="row">';
    if(f.projectId==='__other__'){
      html+='      <div class="field"><div class="flabel">在做什麼? / Doing what?</div>';
      html+='        <input class="fc" value="'+(f.projectLabel||'')+'" oninput="state.modalForm.projectLabel=this.value;" placeholder="例:寫工作追蹤器"></div>';
    } else {
      html+='      <div class="field"><div class="flabel">Stage / 階段</div>';
      html+='        <select class="fc" onchange="state.modalForm.stage=this.value;">';
      ['前置','初剪','ES','業配','其他'].forEach(function(s){html+='        <option value="'+s+'" '+(f.stage===s?'selected':'')+'>'+s+'</option>';});
      html+='        </select></div>';
    }
    html+='      <div class="field"><div class="flabel">Note / 備註</div><input class="fc" value="'+(f.note||'')+'" oninput="state.modalForm.note=this.value;"></div>';
    html+='    </div>';
    html+='    <div class="row">';
    html+='      <div class="field"><div class="flabel">開始日 · Start</div><input type="date" class="fc" value="'+f.startDate+'" onchange="state.modalForm.startDate=this.value;"></div>';
    html+='      <div class="field"><div class="flabel">開始時間</div><input type="time" class="fc" value="'+f.startTime+'" onchange="state.modalForm.startTime=this.value;"></div>';
    html+='    </div>';
    html+='    <div class="row">';
    html+='      <div class="field"><div class="flabel">結束日 · End</div><input type="date" class="fc" value="'+f.endDate+'" onchange="state.modalForm.endDate=this.value;"></div>';
    html+='      <div class="field"><div class="flabel">結束時間</div><input type="time" class="fc" value="'+f.endTime+'" onchange="state.modalForm.endTime=this.value;"></div>';
    html+='    </div>';
    html+='    <div class="modal-btns">';
    if(isEdit)html+='      <button class="btn-sub danger" onclick="deleteFromModal()">刪除</button>';
    html+='      <button class="btn-sub" onclick="closeModal()">取消</button>';
    html+='      <button class="btn-sub primary" onclick="saveModal()">儲存</button>';
    html+='    </div>';
    html+='  </div>';
    html+='</div>';
  }

  document.getElementById('app').innerHTML=html;
}

render();
document.addEventListener('click',function(){if(state.gearMenu){state.gearMenu=false;render();}});
if(USE_API){refreshProjects();syncFromCloud();}
</script>
</body>
</html>
